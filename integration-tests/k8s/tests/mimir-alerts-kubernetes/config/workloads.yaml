apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmgr-global
  namespace: ${NAMESPACE}
data:
  glbl: |
    global:
      resolve_timeout: 5m
      http_config:
        follow_redirects: true
        enable_http2: true
      smtp_hello: localhost
      smtp_require_tls: true
    route:
      receiver: "null"
    receivers:
    - name: "null"
    - name: "alloy-namespace/global-config/myreceiver"
    templates:
    - 'default_template'
---
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: alertmgr-config1
  namespace: ${NAMESPACE}
  labels:
    alloy-integration-test: "true"
spec:
  route:
    receiver: "null"
    routes:
    - receiver: myamc
      continue: true
  receivers:
  - name: "null"
  - name: myamc
    webhookConfigs:
    - url: http://test.url
      httpConfig:
        followRedirects: true
---
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: alertmgr-config2
  namespace: ${NAMESPACE}
  labels:
    alloy-integration-test: "true"
spec:
  route:
    receiver: "null"
    routes:
    - receiver: "database-pager"
      groupWait: 10s
      matchers:
      - name: service
        value: webapp
  receivers:
  - name: "null"
  - name: "database-pager"
---
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: alertmgr-config3
  namespace: ${NAMESPACE}
spec:
  route:
    receiver: "null"
    routes:
    - receiver: "database-pager"
      group_wait: 10s
      matchers:
      - name: service
        value: webapp
  receivers:
  - name: "null"
  - name: "database-pager"
---
# Negative-case fixture: this AlertmanagerConfig lives in a SEPARATE namespace
# (othernamespace) and is intentionally semantically malformed — `matchers` is
# a list of strings instead of {name, value, matchType} objects. We expect
# Alloy to log a parse error for this CRD and skip it, while still merging the
# valid configs above into Mimir's alertmanager_config (see expected_*.yml).
# Do NOT "fix" the matcher block; the test asserts the error path.
apiVersion: v1
kind: Namespace
metadata:
  name: othernamespace
  labels:
    alloy-integration-test: "true"
---
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: alertmgr-config3
  namespace: othernamespace
  labels:
    alloy-integration-test: "true"
spec:
  route:
    receiver: "null"
    routes:
    - receiver: team-X-mails
      matchers:
      - service
        foo1|foo2|baz"
  receivers:
  - name: "null"
  - name: "team-X-mails"
    emailConfigs:
    - to: "team-X+alerts@example.org"
