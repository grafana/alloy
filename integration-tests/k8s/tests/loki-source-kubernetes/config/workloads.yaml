---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: log-producer
  namespace: ${NAMESPACE_A}
spec:
  serviceName: log-producer
  replicas: 2
  selector:
    matchLabels:
      app: log-producer
  template:
    metadata:
      labels:
        app: log-producer
        alloy-logs-test: "true"
    spec:
      containers:
        - name: log-producer
          image: log-producer:test
          imagePullPolicy: Never
