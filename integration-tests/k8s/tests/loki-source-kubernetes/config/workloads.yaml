---
apiVersion: v1
kind: Pod
metadata:
  name: log-producer
  namespace: ${NAMESPACE}
  labels:
    app: log-producer
    alloy-logs-test: "true"
spec:
  containers:
    - name: log-producer
      image: log-producer:test
      imagePullPolicy: Never
