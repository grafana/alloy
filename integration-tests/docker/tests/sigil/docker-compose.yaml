services:
  alloy:
    image: alloy-integration-tests
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
      - --stability.level=experimental
    volumes:
      - ./config.alloy:/etc/alloy/config.alloy
    ports:
      - "1234:1234"
      - "12341:12345"
    depends_on:
      - echo-server
    networks:
      - sigil-test

  echo-server:
    build:
      context: ./echo-server
    ports:
      - "8888:8888"
    networks:
      - sigil-test

networks:
  sigil-test:
    driver: bridge
