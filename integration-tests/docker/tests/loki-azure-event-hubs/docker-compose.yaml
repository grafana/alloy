services:
  cert-init:
    # Reuse the kafka-eh image — it already bundles openssl, so we avoid pulling
    # a second base image. Runs as root so it can write to a freshly-bind-mounted
    # /certs dir; the script chowns outputs back to uid 1000 (kafka appuser,
    # typical host user) before exiting.
    image: apache/kafka:latest@sha256:9516fb7634bad307d17c33b589fde9023003b0cb761374f500002b980a3149b9
    user: "0:0"
    restart: "no"
    entrypoint: ["sh", "/gen-certs.sh"]
    volumes:
      - ./gen-certs.sh:/gen-certs.sh:ro
      - ./kafka_server_jaas.conf:/input/kafka_server_jaas.conf:ro
      - ./keystore.creds:/input/keystore.creds:ro
      - ./certs:/certs

  kafka-eh:
    image: apache/kafka:latest@sha256:9516fb7634bad307d17c33b589fde9023003b0cb761374f500002b980a3149b9
    container_name: kafka-eh
    depends_on:
      cert-init:
        condition: service_completed_successfully
    ports:
      - "29093:29093"
    # The image's `configure` script unconditionally exports an empty
    # `KAFKA_SSL_KEYSTORE_PASSWORD` whenever SSL is enabled, which Kafka rejects
    # for PEM keystores. Run the standard sequence and unset the offending vars
    # before launch.
    entrypoint:
      - /usr/bin/env
      - bash
      - -c
      - |
        set -e
        source /etc/kafka/docker/bash-config
        source /etc/kafka/docker/configureDefaults
        source /etc/kafka/docker/configure
        unset KAFKA_SSL_KEYSTORE_PASSWORD KAFKA_SSL_KEY_PASSWORD
        source /etc/kafka/docker/launch
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: SASL_SSL://:9093,SASL_SSL_HOST://:29093,CONTROLLER://:9094
      KAFKA_ADVERTISED_LISTENERS: SASL_SSL://kafka-eh:9093,SASL_SSL_HOST://localhost:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: SASL_SSL
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,SASL_SSL:SASL_SSL,SASL_SSL_HOST:SASL_SSL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9094
      KAFKA_SASL_ENABLED_MECHANISMS: PLAIN
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN
      KAFKA_LISTENER_NAME_SASL_SSL_PLAIN_SASL_JAAS_CONFIG: 'org.apache.kafka.common.security.plain.PlainLoginModule required username="admin" password="admin-secret" user_admin="admin-secret" user_$$ConnectionString="fake-connection-string";'
      KAFKA_LISTENER_NAME_SASL_SSL_HOST_PLAIN_SASL_JAAS_CONFIG: 'org.apache.kafka.common.security.plain.PlainLoginModule required username="admin" password="admin-secret" user_admin="admin-secret" user_$$ConnectionString="fake-connection-string";'
      KAFKA_SSL_KEYSTORE_TYPE: PEM
      KAFKA_SSL_KEYSTORE_FILENAME: kafka-keystore.pem
      KAFKA_SSL_KEYSTORE_CREDENTIALS: keystore.creds
      KAFKA_SSL_KEY_CREDENTIALS: keystore.creds
      KAFKA_SSL_CLIENT_AUTH: none
      KAFKA_SSL_TRUSTSTORE_TYPE: PEM
      KAFKA_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/server.crt
      KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ""
      KAFKA_OPTS: "-Djava.security.auth.login.config=/etc/kafka/secrets/kafka_server_jaas.conf"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 10
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - ./certs:/etc/kafka/secrets:ro
    healthcheck:
      test:
        - CMD-SHELL
        - |
          cat > /tmp/client.properties <<EOF
          security.protocol=SASL_SSL
          sasl.mechanism=PLAIN
          sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username="admin" password="admin-secret";
          ssl.truststore.type=PEM
          ssl.truststore.location=/etc/kafka/secrets/server.crt
          ssl.endpoint.identification.algorithm=
          EOF
          /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9093 --command-config /tmp/client.properties >/dev/null
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 45s

  alloy:
    image: alloy-integration-tests
    depends_on:
      kafka-eh:
        condition: service_healthy
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr
      - 0.0.0.0:12345
      - --stability.level
      - experimental
    environment:
      SSL_CERT_FILE: /certs/server.crt
    volumes:
      - ./config.alloy:/etc/alloy/config.alloy:ro
      - ./certs:/certs:ro
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/12345"]
      interval: 2s
      timeout: 5s
      retries: 10
    networks:
      - default
      - alloy-integration-tests_integration-tests

networks:
  alloy-integration-tests_integration-tests:
    external: true
