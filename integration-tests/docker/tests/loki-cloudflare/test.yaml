alloy_container:
  environment:
    ALLOY_CLOUDFLARE_API_URL: "http://logpullmock:8080/client/v4"

additional_containers:
  - name: logpullmock
    image: logpullmock:latest
    build:
      context: logpullmock
      dockerfile: Dockerfile
    startup_healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 1s
