apiVersion: v1
kind: Namespace
metadata:
  name: k8s-v2-workloads
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: logs-source
  namespace: k8s-v2-workloads
data:
  app.log: |
    k8s-v2-log-line: this line should arrive in Loki
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-generator
  namespace: k8s-v2-workloads
spec:
  replicas: 1
  selector:
    matchLabels:
      app: log-generator
  template:
    metadata:
      labels:
        app: log-generator
    spec:
      containers:
        - name: writer
          image: busybox:1.36
          args:
            - "sh"
            - "-c"
            - "cat /input/app.log > /var/log/k8s-v2/app.log && sleep 600"
          volumeMounts:
            - name: input
              mountPath: /input
            - name: logs
              mountPath: /var/log/k8s-v2
      volumes:
        - name: input
          configMap:
            name: logs-source
        - name: logs
          emptyDir: {}
