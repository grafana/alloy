controller:
  type: deployment
  replicas: 1

alloy:
  configMap:
    content: |
      prometheus.scrape "generator" {
        targets = [{
          __address__ = "metrics-generator.${TEST_NAMESPACE}.svc.cluster.local:9090",
          test_id     = "${TEST_ID}",
        }]

        forward_to = [prometheus.remote_write.mimir.receiver]
      }

      prometheus.remote_write "mimir" {
        endpoint {
          url = "http://mimir.mimir.svc.cluster.local:9009/api/v1/push"
        }
      }
