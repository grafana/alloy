apiVersion: v1
kind: Namespace
metadata:
  name: k8s-v2-workloads
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-metrics-config
  namespace: k8s-v2-workloads
data:
  config.alloy: |
    prometheus.scrape "generator" {
      targets = [{
        __address__ = "metrics-generator.k8s-v2-workloads.svc.cluster.local:9090",
      }]

      forward_to = [prometheus.remote_write.mimir.receiver]
    }

    prometheus.remote_write "mimir" {
      endpoint {
        url = "http://mimir.k8s-v2-observability.svc.cluster.local:9009/api/v1/push"
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-generator
  namespace: k8s-v2-workloads
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metrics-generator
  template:
    metadata:
      labels:
        app: metrics-generator
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v3.5.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
          ports:
            - containerPort: 9090
---
apiVersion: v1
kind: Service
metadata:
  name: metrics-generator
  namespace: k8s-v2-workloads
spec:
  selector:
    app: metrics-generator
  ports:
    - name: http
      port: 9090
      targetPort: 9090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alloy-metrics
  namespace: k8s-v2-workloads
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alloy-metrics
  template:
    metadata:
      labels:
        app: alloy-metrics
    spec:
      containers:
        - name: alloy
          image: grafana/alloy:latest
          args:
            - "run"
            - "/etc/alloy/config.alloy"
          volumeMounts:
            - name: config
              mountPath: /etc/alloy
      volumes:
        - name: config
          configMap:
            name: alloy-metrics-config
