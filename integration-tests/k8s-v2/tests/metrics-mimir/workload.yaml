apiVersion: v1
kind: Namespace
metadata:
  name: ${TEST_NAMESPACE}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-generator
  namespace: ${TEST_NAMESPACE}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metrics-generator
      test-id: ${TEST_ID}
  template:
    metadata:
      labels:
        app: metrics-generator
        test-id: ${TEST_ID}
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v3.5.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
          ports:
            - containerPort: 9090
---
apiVersion: v1
kind: Service
metadata:
  name: metrics-generator
  namespace: ${TEST_NAMESPACE}
spec:
  selector:
    app: metrics-generator
    test-id: ${TEST_ID}
  ports:
    - name: http
      port: 9090
      targetPort: 9090
