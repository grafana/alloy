# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

tasks:
  alloy:
    desc: Build the alloy binary. SKIP_UI_BUILD=1 to skip npm install/build.
    deps:
      - :gen:ui
    dir: collector
    env:
      GOOS: "{{.GOOS}}"
      GOARCH: "{{.GOARCH}}"
      GOARM: "{{.GOARM}}"
      CGO_ENABLED: "{{.CGO_ENABLED}}"
      GOEXPERIMENT: "{{.GOEXPERIMENT}}"
    vars:
      # Computed per call so caller overrides of GO_TAGS / RELEASE_BUILD take effect.
      LOCAL_TAGS: >-
        {{- if regexMatch "(^|\\s)gore2regex(\\s|$)" .GO_TAGS -}}
        {{.GO_TAGS}}
        {{- else -}}
        {{ trim (printf "gore2regex %s" .GO_TAGS) }}
        {{- end -}}
      LOCAL_FLAGS: '-ldflags "{{ if eq .RELEASE_BUILD "1" }}-s -w {{ end }}{{.GO_LDFLAGS}}" -tags "{{.LOCAL_TAGS}}"'
    cmds:
      - go build {{.LOCAL_FLAGS}} -o ../{{.ALLOY_BINARY}} .

  alloy-service:
    desc: Build the alloy-service Windows binary.
    env:
      GOOS: "{{.GOOS}}"
      GOARCH: "{{.GOARCH}}"
      GOARM: "{{.GOARM}}"
      CGO_ENABLED: "{{.CGO_ENABLED}}"
      GOEXPERIMENT: "{{.GOEXPERIMENT}}"
    vars:
      LOCAL_TAGS: >-
        {{- if regexMatch "(^|\\s)gore2regex(\\s|$)" .GO_TAGS -}}
        {{.GO_TAGS}}
        {{- else -}}
        {{ trim (printf "gore2regex %s" .GO_TAGS) }}
        {{- end -}}
      LOCAL_FLAGS: '-ldflags "{{ if eq .RELEASE_BUILD "1" }}-s -w {{ end }}{{.GO_LDFLAGS}}" -tags "{{.LOCAL_TAGS}}"'
    cmds:
      - go build {{.LOCAL_FLAGS}} -o {{.SERVICE_BINARY}} ./internal/cmd/alloy-service

  alloylint:
    desc: Build the alloylint custom linter binary.
    dir: internal/cmd/alloylint
    env:
      GOOS: "{{.GOOS}}"
      GOARCH: "{{.GOARCH}}"
      GOARM: "{{.GOARM}}"
      CGO_ENABLED: "{{.CGO_ENABLED}}"
      GOEXPERIMENT: "{{.GOEXPERIMENT}}"
    vars:
      LOCAL_TAGS: >-
        {{- if regexMatch "(^|\\s)gore2regex(\\s|$)" .GO_TAGS -}}
        {{.GO_TAGS}}
        {{- else -}}
        {{ trim (printf "gore2regex %s" .GO_TAGS) }}
        {{- end -}}
      LOCAL_FLAGS: '-ldflags "{{ if eq .RELEASE_BUILD "1" }}-s -w {{ end }}{{.GO_LDFLAGS}}" -tags "{{.LOCAL_TAGS}}"'
    cmds:
      - go build {{.LOCAL_FLAGS}} -o ../../../{{.ALLOYLINT_BINARY}} .
