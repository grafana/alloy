# yaml-language-server: $schema=https://taskfile.dev/schema.json
#
# container:* tasks implement the USE_CONTAINER=1 proxy that re-invokes task inside grafana/alloy-build-image.
version: "3"

vars:
  GO_CACHE_VOLUME: alloy-build-container-gocache
  GO_MODCACHE_VOLUME: alloy-build-container-gomodcache

tasks:
  # Native-vs-container chooser. Used inside every public wrapper task.
  # Native path: dispatches to INNER via the YAML `task:` directive.
  # Container path: delegates to container:run, which shells `docker run`.
  # IN_CONTAINER env short-circuits inside the container so the wrapper's
  # second hit through container:exec doesn't recurse into docker.
  exec:
    internal: true
    requires:
      vars:
        - name: INNER
        - name: USE_CONTAINER
          enum: ["0", "1"]
    cmds:
      # The leading `:` must be a literal YAML character. Template-rendered
      # leading colons are not recognized as absolute-path markers in
      # Taskfile v3.45.5 (the renderer prepends the current namespace and
      # the call resolves to e.g. `container::inner` -> not found).
      #
      # Taskfile only propagates vars one level via the `vars:` block on a
      # `task:` directive, so every override caller passes to a wrapper must
      # be re-forwarded here to reach the `_native` task.
      - task: ':{{ if and (eq .USE_CONTAINER "1") (eq .IN_CONTAINER "") }}container:run{{ else }}{{.INNER}}{{ end }}'
        vars:
          INNER: "{{.INNER}}"
          GO_TAGS: "{{.GO_TAGS}}"
          RELEASE_BUILD: "{{.RELEASE_BUILD}}"
          GOOS: "{{.GOOS}}"
          GOARCH: "{{.GOARCH}}"
          GOARM: "{{.GOARM}}"
          CGO_ENABLED: "{{.CGO_ENABLED}}"
          GOEXPERIMENT: "{{.GOEXPERIMENT}}"
          ALLOY_BINARY: "{{.ALLOY_BINARY}}"
          SERVICE_BINARY: "{{.SERVICE_BINARY}}"
          SKIP_UI_BUILD: "{{.SKIP_UI_BUILD}}"

  run:
    desc: |
      Re-invoke INNER task inside the build container. Prefer using a
      wrapper that calls container:exec instead of calling this directly.
    requires:
      vars:
        - name: INNER
    vars:
      DOCKER_ENVS: >-
        -e "IN_CONTAINER=1"
        -e "CC=viceroycc"
        -e "ALLOY_IMAGE={{.ALLOY_IMAGE}}"
        -e "ALLOY_IMAGE_WINDOWS={{.ALLOY_IMAGE_WINDOWS}}"
        -e "BUILD_IMAGE={{.BUILD_IMAGE}}"
        -e "GOOS={{.GOOS}}"
        -e "GOARCH={{.GOARCH}}"
        -e "GOARM={{.GOARM}}"
        -e "CGO_ENABLED={{.CGO_ENABLED}}"
        -e "RELEASE_BUILD={{.RELEASE_BUILD}}"
        -e "ALLOY_BINARY={{.ALLOY_BINARY}}"
        -e "VERSION={{.VERSION}}"
        -e "GO_TAGS={{.GO_TAGS}}"
        -e "GOEXPERIMENT={{.GOEXPERIMENT}}"
        -e "GOLANGCI_LINT_BINARY={{.GOLANGCI_LINT_BINARY}}"
        -e "SKIP_UI_BUILD={{.SKIP_UI_BUILD}}"
      CACHE_OPTS:
        sh: |
          if docker volume inspect {{.GO_CACHE_VOLUME}} >/dev/null 2>&1 \
              && docker volume inspect {{.GO_MODCACHE_VOLUME}} >/dev/null 2>&1; then
            echo "-v {{.GO_CACHE_VOLUME}}:/root/.cache/go-build -v {{.GO_MODCACHE_VOLUME}}:/go/pkg/mod"
          fi
    cmds:
      - >-
        docker run -it --init --rm
        {{.DOCKER_ENVS}} {{.CACHE_OPTS}}
        -v "$(pwd):/src" -w /src
        -v /var/run/docker.sock:/var/run/docker.sock
        {{.BUILD_IMAGE}} task {{.INNER}}

  cache:build:
    desc: Create Docker volumes used to cache Go build/mod between container runs.
    cmds:
      - docker volume create {{.GO_CACHE_VOLUME}}
      - docker volume create {{.GO_MODCACHE_VOLUME}}

  cache:clean:
    desc: Remove the Docker volumes used by container:cache:build.
    cmds:
      - |
        if command -v docker >/dev/null 2>&1; then
          docker volume rm -f {{.GO_CACHE_VOLUME}} {{.GO_MODCACHE_VOLUME}} || true
        fi
