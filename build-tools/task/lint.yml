# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

tasks:
  default:
    desc: Run linters.
    cmds:
      - task: go
      - task: alloylint
      - task: shellcheck

  go:
    desc: Run Go linters.
    cmds:
      - task: golangci-lint
      - task: alloylint

  golangci-lint:
    desc: Run golangci-lint.
    internal: true
    dir: "tools"
    cmds:
      - mise exec -- go run ./cmd lint shell

  shellcheck:
    desc: Run shellcheck linter.
    dir: "tools"
    cmds:
      - mise exec -- go run ./cmd lint shell

  alloylint:
    desc: Run the alloylint linter.
    vars:
      LOCAL_TAGS: >-
        {{- if regexMatch "(^|\\s)gore2regex(\\s|$)" .GO_TAGS -}}
        {{.GO_TAGS}}
        {{- else -}}
        {{ trim (printf "gore2regex %s" .GO_TAGS) }}
        {{- end -}}
    cmds:
      - GOFLAGS="-tags={{.LOCAL_TAGS}}" go run -tags='{{.LOCAL_TAGS}}' ./internal/cmd/alloylint ./...
