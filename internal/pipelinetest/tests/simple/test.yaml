config: |
  loki.relabel "default" {
    forward_to = [loki.write.default.receiver]

    rule {
      source_labels = ["foo"]
      target_label  = "replaced"
    }

    rule {
      action = "labeldrop"
      regex  = "^foo$"
    }
  }

  loki.write "default" {
    endpoint {
      url        = pipelinetest.loki.url
      batch_wait = "10ms"
    }
  }

inputs:
  loki:
    - components:
        - loki.relabel.default.receiver
      entries:
        - labels:
            foo: bar
          line: test
          timestamp: "2026-04-14T12:53:51.470999516+02:00"

assert:
  loki:
    - type: entry_count
      count: 1
    - type: has_entry
      match:
        labels:
          replaced: bar
        line: test
        timestamp: "2026-04-14T12:53:51.470999516+02:00"
