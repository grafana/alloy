config: |
  loki.source.file "file" {
    targets = [{__path__ = "./tests/file-source/*.log"}]

    file_match {
      enabled     = true
      sync_period = "50ms"
    }

    forward_to = [loki.process.default.receiver]
  }

  loki.process "default" {
    forward_to = [loki.write.default.receiver]

    stage.static_labels {
      values = {
        test = "test",
      }
    }

    stage.label_drop {
      values = ["filename"]
    }
  }

  loki.write "default" {
    endpoint {
      url        = pipelinetest.loki.url
      batch_wait = "10ms"
    }
  }

assert:
  loki:
    - type: entry_count
      count: 2
    - type: has_entry
      match:
        labels:
          test: test
        line: line 1
    - type: has_entry
      match:
        labels:
          test: test
        line: line 2
