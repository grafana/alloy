config: |
  loki.process "default" {
    forward_to = [loki.relabel.default.receiver]

    stage.static_labels {
      values = {
        test = "test",
      }
    }
  }

  loki.relabel "default" {
    forward_to = [pipelinetest.loki.receiver]

    rule {
      source_labels = ["foo"]
      target_label  = "replaced"
    }

    rule {
      action = "labeldrop"
      regex  = "^foo$"
    }
  }

inputs:
  loki:
    - components:
        - loki.process.default.receiver
      entries:
        - labels:
            foo: bar
          line: test
          timestamp: "2026-04-14T12:53:51.470999516+02:00"

assert:
  loki:
    - type: entry_count
      count: 1
    - type: has_entry
      match:
        labels:
          replaced: bar
          test: test
        line: test
        timestamp: "2026-04-14T12:53:51.470999516+02:00"
