title = "gitleakstests extended config"

[extend]
useDefault = true

# allowlist by secret – ignore when the “secret” is a UUID.
[[rules]]
id = "generic-api-key"
  [[rules.allowlists]]
  description = "ignore when extracted secret is a UUID"
  regexTarget = "secret"
  regexes = [
    '''^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$''',
  ]
  # Ignore finding when the match is tokenId and its variants
  [[rules.allowlists]]
  description = "ignore tokenId keyword for generic-api-key"
  regexTarget = "match"
  regexes = [ "(?i)token_?id" ]
