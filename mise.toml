[tools]
# Required for mise task completion. See https://usage.jdx.dev.
usage = "3.3.0"
go = "1.26.2"
node = "24.13.0"
shellcheck = "0.11.0"
golangci-lint = "2.11.4"
kind = "0.24.0"

[env]
CGO_ENABLED = "{{ env.CGO_ENABLED | default(value='1') }}"

[tasks."build"]
description = "Build alloy with frontend assets"
depends = ["build:frontend"]
file = "mise-tasks/_build/build"

[tasks."build:binary"]
description = "Build the alloy binary (skips UI generation)"
file = "mise-tasks/_build/build"

[tasks."install:frontend"]
description = "Install frontend dependencies via npm ci"
sources = ["internal/web/ui/package.json", "internal/web/ui/package-lock.json"]
outputs = ["internal/web/ui/node_modules/.package-lock.json"]
run = "cd internal/web/ui && npm ci"

[tasks."build:frontend"]
description = "Build the alloy frontend UI assets"
depends = ["install:frontend"]
sources = [
  "internal/web/ui/src/**/*",
  "internal/web/ui/public/**/*",
  "internal/web/ui/index.html",
  "internal/web/ui/package.json",
  "internal/web/ui/package-lock.json",
  "internal/web/ui/vite.config.ts",
  "internal/web/ui/tsconfig*.json",
]
outputs = ["internal/web/ui/dist/**/*"]
run = "cd internal/web/ui && npm run build"

[tasks."lint"]
description = "Run all linters (scripts, go, alloy, frontend)"
depends = ["lint:scripts", "lint:go", "lint:alloy", "lint:frontend"]

[tasks."lint:scripts"]
description = "Run shellcheck on shell scripts"
file = "mise-tasks/_lint/scripts"

[tasks."lint:go"]
description = "Run golangci-lint on every Go module"
file = "mise-tasks/_lint/go"

[tasks."lint:alloy"]
description = "Run the custom alloylint analyzer"
run = "go run ./internal/cmd/alloylint ./..."

[tasks."lint:frontend"]
description = "Lint and format-check the frontend (eslint + prettier)"
depends = ["install:frontend"]
run = "cd internal/web/ui && npm run lint && npm run format"

[tasks."test"]
description = "Run go test on every Go module"
file = "mise-tasks/_test/go"

[tasks."test:integration:docker"]
description = "Run Docker-based integration tests"
usage = '''
flag "--timeout <duration>" help="Test timeout (e.g. 15m, 30s)" default="15m"
'''
run = "go run -C integration-tests/docker . --test-timeout=$usage_timeout"

[tasks."test:integration:k8s"]
description = "Run Kubernetes-based integration tests"
usage = '''
flag "--shard <shard>" help="Split test packages across shards (e.g. 0/2)" default=""
'''
run = "go run ./integration-tests/k8s/runner --test-tags=gore2regex --shard=$usage_shard"

[tasks."test:integration:k8s:dev"]
description = "Run k8s integration tests with the interactive TUI"
run = "go run ./integration-tests/k8s/runner --interactive --test-tags=gore2regex"
