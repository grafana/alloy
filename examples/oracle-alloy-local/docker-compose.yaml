# Two gvenzl Oracle Free instances only. Start Alloy on the host separately (see config.alloy header).
# Published ports: localhost:15211 → DB1, localhost:15222 → DB2 (password testpassword).
# First boot of each Oracle DB can take several minutes.

name: oracle-alloy-local

services:
  oracledb1:
    image: gvenzl/oracle-free:23-slim
    environment:
      ORACLE_PASSWORD: testpassword
    ports:
      - "15211:1521"

  oracledb2:
    image: gvenzl/oracle-free:23-slim
    environment:
      ORACLE_PASSWORD: testpassword
    ports:
      - "15222:1521"
