name: Mark and close stale issues and PRs
on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 0 * * *"
permissions:
  contents: read
jobs:
  stale:
    permissions:
      contents: read
      issues: write # for actions/stale to close stale issues
      pull-requests: write # for actions/stale to close stale PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@eb5cf3af3ac0a1aa4c9c45633dd1ae542a27a899 # v10.3.0
        with:
          days-before-issue-stale: 30
          days-before-issue-close: -1 # TODO(x1unix): set to 90 days
          stale-issue-label: stale
          exempt-issue-labels: keepalive,proposal,outdated-dependency,dev-branch
          stale-issue-message: This issue was marked stale due to lack of activity. It will be closed in 90 days.
          close-issue-message: This issue has been closed as inactive because it has been stale for 90 days with no activity.
          days-before-pr-stale: 30
          days-before-pr-close: -1 # TODO(x1unix): set to 90 days
          stale-pr-label: stale
          exempt-pr-labels: keepalive,proposal,outdated-dependency,dev-branch
          stale-pr-message: This PR was marked stale due to lack of activity. It will be closed in 90 days.
          close-pr-message: Closed as inactive. Feel free to reopen if this PR is still being worked on.
