name: Build and test

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  # Cancel any running workflow for the same branch when new commits are pushed.
  # We group both by ref_name (available when CI is triggered by a push to a branch/tag)
  # and head_ref (available when CI is triggered by a PR).
  group: "${{ github.ref_name }}-${{ github.head_ref }}"
  cancel-in-progress: true

jobs:
  test_ver:
    runs-on: ubuntu-latest
    steps:
      - name: Update to latest image
        run: |
          IMG_TAG_INT=$(echo "grafana/alloy-dev:$(bash ./tools/image-tag-docker)")
          echo "IMG_TAG=$IMG_TAG_INT" >> $GITHUB_ENV
      - name: create file image tag
        run: |
          cat << EOF > config.json
          {
          "update_jsonnet_attribute_configs": [
            {
              "file_path": "ksonnet/lib/alloy/waves/alloy.libsonnet",
              "jsonnet_key": "dev_canary",
              "jsonnet_value": "$IMG_TAG"
            }
            ]
          }
          EOF
      - name: print image file
        run: |
          cat config.json


  setup-environment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Go 1.23
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - name: Cache Go
        id: go-cache
        uses: actions/cache@v4.2.0
        with:
          path: |
            ~/go/bin
            ~/go/pkg/mod
          key: go-cache-${{ hashFiles('**/go.sum') }}
          enableCrossOsArchive: true
      - name: Download dependencies
        if: steps.go-cache.outputs.cache-hit != 'true'
        run: go mod download

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: setup-environment
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: false
    - name: Cache Go
      id: go-cache
      uses: actions/cache@v4.2.0
      with:
        path: |
          ~/go/bin
          ~/go/pkg/mod
        key: go-cache-${{ hashFiles('**/go.sum') }}
        enableCrossOsArchive: true
    - run: sudo apt-get update -y && sudo apt-get install -y libsystemd-dev
    - run: make lint

  test_linux:
    name: Test Linux
    runs-on: ubuntu-latest
    needs: setup-environment
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Go 1.23
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: false
    - name: Cache Go
      id: go-cache
      uses: actions/cache@v4.2.0
      with:
        path: |
          ~/go/bin
          ~/go/pkg/mod
        key: go-cache-${{ hashFiles('**/go.sum') }}
        enableCrossOsArchive: true
    - run: make GO_TAGS="nodocker" test

  test:
    name: Test Mac
    strategy:
      matrix:
        platform: [macos-latest-xlarge]
    runs-on: ${{ matrix.platform }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Go 1.23
      uses: actions/setup-go@v5
      with:
        go-version: "1.23"
        cache: false
    - name: Cache Go
      id: go-cache
      uses: actions/cache@v4.2.0
      with:
        path: |
          ~/go/bin
          ~/go/pkg/mod
        key: go-cache-${{ hashFiles('**/go.sum') }}
        enableCrossOsArchive: true
    - name: Test
      run: CGO_LDFLAGS="-ld_classic $CGO_LDFLAGS" make GO_TAGS="nodocker" test

  build_linux:
    name: Build on Linux
    runs-on: ubuntu-latest
    needs: setup-environment
    container: grafana/alloy-build-image:v0.1.8
    strategy:
      matrix:
        os: [linux]
        arch: [amd64, arm64, ppc64le, s390x]
    steps:
    - name: Install zstd
      run: |
        apt-get update
        apt-get install zstd
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set ownership
      # This is required when we checkout inside a container.
      # https://github.com/actions/runner/issues/2033#issuecomment-1204205989
      run: |
          # this is to fix GIT not liking owner of the checkout dir
          chown -R $(id -u):$(id -g) $PWD
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: false
    - name: Cache Go
      id: go-cache
      uses: actions/cache@v4.2.0
      with:
        path: |
          ~/go/bin
          ~/go/pkg/mod
        key: go-cache-${{ hashFiles('**/go.sum') }}
        enableCrossOsArchive: true
    - run: make generate-ui
    - run: GO_TAGS="builtinassets promtail_journal_enabled" GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} GOARM= make alloy

  build_linux_boringcrypto:
    name: Build on Linux (boringcrypto)
    runs-on: ubuntu-latest
    needs: setup-environment
    container: grafana/alloy-build-image:v0.1.8-boringcrypto
    strategy:
      matrix:
        os: [linux]
        arch: [amd64, arm64]
    steps:
    - name: Install zstd
      run: |
        apt-get update
        apt-get install zstd
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set ownership
      # This is required when we checkout inside a container.
      # https://github.com/actions/runner/issues/2033#issuecomment-1204205989
      run: |
          # this is to fix GIT not liking owner of the checkout dir
          chown -R $(id -u):$(id -g) $PWD
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: false
    - name: Cache Go
      id: go-cache
      uses: actions/cache@v4.2.0
      with:
        path: |
          ~/go/bin
          ~/go/pkg/mod
        key: go-cache-${{ hashFiles('**/go.sum') }}
        enableCrossOsArchive: true
    - run: make generate-ui
    - run: GO_TAGS="builtinassets promtail_journal_enabled" GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} GOARM= GOEXPERIMENT=boringcrypto make alloy

  build_mac_intel:
    name: Build on MacOS (Intel)
    runs-on: macos-14-large
    needs: setup-environment
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: false
    - name: Cache Go
      id: go-cache
      uses: actions/cache@v4.2.0
      with:
        path: |
          ~/go/bin
          ~/go/pkg/mod
        key: go-cache-${{ hashFiles('**/go.sum') }}
        enableCrossOsArchive: true
    - run: make generate-ui
    - run: GO_TAGS="builtinassets" GOOS=darwin GOARCH=amd64 GOARM= make alloy

  build_mac_arm:
    name: Build on MacOS (ARM)
    runs-on: macos-14-xlarge
    needs: setup-environment
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: false
    - name: Cache Go
      id: go-cache
      uses: actions/cache@v4.2.0
      with:
        path: |
          ~/go/bin
          ~/go/pkg/mod
        key: go-cache-${{ hashFiles('**/go.sum') }}
        enableCrossOsArchive: true
    - run: make generate-ui
    - run: GO_TAGS="builtinassets" GOOS=darwin GOARCH=arm64 GOARM= make alloy

  build_windows:
    name: Build on Windows (AMD64)
    runs-on: windows-latest
    needs: setup-environment
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: false
    - name: Cache Go
      # Windows won't restore the Linux cache because 
      # Linux uses different line breaks and the hashes don't match.
      # TODO: Change the line breaks on Windows? Or just leave it as it is?
      id: go-cache
      uses: actions/cache@v4.2.0
      with:
        path: |
          ~/go/bin
          ~/go/pkg/mod
        key: go-cache-${{ hashFiles('**/go.sum') }}
        enableCrossOsArchive: true
    - run: make generate-ui
    - run: echo "GO_TAGS=builtinassets" | Out-File -FilePath $env:GITHUB_ENV -Append
    - run: echo "GOOS=windows" | Out-File -FilePath $env:GITHUB_ENV -Append
    - run: echo "GOARCH=amd64" | Out-File -FilePath $env:GITHUB_ENV -Append
    - run: make alloy

  build_freebsd:
    name: Build on FreeBSD (AMD64)
    runs-on: ubuntu-latest
    needs: setup-environment
    container: grafana/alloy-build-image:v0.1.8
    steps:
    - name: Install zstd
      run: |
        apt-get update
        apt-get install zstd
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set ownership
      # This is required when we checkout inside a container.
      # https://github.com/actions/runner/issues/2033#issuecomment-1204205989
      run: |
          # this is to fix GIT not liking owner of the checkout dir
          chown -R $(id -u):$(id -g) $PWD
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: false
    - name: Cache Go
      id: go-cache
      uses: actions/cache@v4.2.0
      with:
        path: |
          ~/go/bin
          ~/go/pkg/mod
        key: go-cache-${{ hashFiles('**/go.sum') }}
        enableCrossOsArchive: true
    - run: make generate-ui
    - run: GO_TAGS="builtinassets" GOOS=freebsd GOARCH=amd64 GOARM= make alloy
