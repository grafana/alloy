name: Check Docker images

on:
  pull_request:
    paths:
      - Dockerfile
      - Dockerfile.windows
      - Makefile
      - 'tools/make/*'

permissions:
  contents: read

jobs:
  # NOTE(rfratto): We only test building the Docker images for the host
  # platform, but we're really only looking for issues that are
  # architecture-independent.
  linux:
    # We use a large runner for the additional disk space.
    runs-on: github-hosted-ubuntu-x64-large
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Build image
        run: |
          docker build -t alloy-test:latest -f Dockerfile .

  windows:
    runs-on: windows-2022
    steps:
      - name: Wait for Docker to be ready
        run: |
          $retries = 0
          $maxRetries = 30
          while ($retries -lt $maxRetries) {
            docker info 2>$null
            if ($LASTEXITCODE -eq 0) {
              Write-Host "Docker is ready."
              exit 0
            }
            $retries++
            Write-Host "Waiting for Docker to be ready... (attempt $retries/$maxRetries)"
            Start-Sleep -Seconds 2
          }
          Write-Host "Docker did not become ready after $maxRetries attempts."
          exit 1

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Build image
        run: |
          docker build -t alloy-test:latest -f Dockerfile.windows .
