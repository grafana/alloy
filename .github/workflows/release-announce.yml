name: Announce Release to Slack

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.13.0)'
        required: true
        default: ''
        type: string
      release_url:
        description: 'Release URL'
        required: true
        default: ''
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  announce-release:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.tag || github.event.release.tag_name }}
      RELEASE_URL: ${{ inputs.release_url || github.event.release.html_url }}
    steps:
      - name: Get secrets 🔐
        id: get-secrets
        uses: grafana/shared-workflows/actions/get-vault-secrets@a53fc80bc30b0a16a262520465db899fa3af08b7 # get-vault-secrets/v1.3.2
        with:
          export_env: false
          repo_secrets: |
            SLACK_CHANNEL_ID_ALLOY=slack:channel_id_alloy

      - name: Determine release type 🏷️
        id: release-type
        run: |
          if [[ "$RELEASE_TAG" == *"-rc"* ]]; then
            echo "is_rc=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_rc=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify internal alloy channel 📢
        if: steps.release-type.outputs.is_rc == 'false'
        uses: grafana/shared-workflows/actions/send-slack-message@eb1fbd807f87aea8f40ff08dc9cd02872cad55b3 # send-slack-message/v2.0.5
        env:
          SLACK_MESSAGE: |
            :alloy: :alloy: :alloy:
            *Grafana Alloy ${{ env.RELEASE_TAG }} is now available!*

            *Release:* <${{ env.RELEASE_URL }}|${{ env.RELEASE_TAG }}>
            *Full changelog:* <https://github.com/${{ github.repository }}/blob/${{ env.RELEASE_TAG }}/CHANGELOG.md|CHANGELOG.md>
            :alloy: :alloy: :alloy:
        with:
          method: chat.postMessage
          payload-templated: false
          payload: |
            {
              "channel": "${{ fromJSON(steps.get-secrets.outputs.secrets).SLACK_CHANNEL_ID_ALLOY }}",
              "text": ${{ toJSON(env.SLACK_MESSAGE) }},
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ${{ toJSON(env.SLACK_MESSAGE) }}
                  }
                }
              ]
            }
