name: Lint
on:
  workflow_call:

permissions:
  contents: read

jobs:
  lint_go:
    name: Lint Go
    runs-on: ubuntu-latest-8-cores

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod
        cache: false

    - name: Install golangci-lint
      uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
      with:
        # renovate: datasource=github-releases packageName=golangci/golangci-lint
        version: v2.11.4
        install-only: true

    - name: Lint Go
      run: make lint-go

    - name: Run Alloy Lint
      run: make run-alloylint

  govulncheck:
    name: Govulncheck
    # xlarge (64 GB): govulncheck's SSA call graph on the
    # alloy/collector/alloyengine modules exceeds smaller runners.
    runs-on: ubuntu-x64-xlarge

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod
        cache: false

    - name: Run govulncheck
      run: make govulncheck

  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Run shellcheck
      run: make lint-shell

  lint_ui:
    name: Lint UI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: internal/web/ui

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Set up Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version-file: internal/web/ui/.nvmrc

    - name: Install dependencies
      run: npm install

    - name: Lint
      run: npm run lint

    - name: Format
      run: npm run format
