name: Test
on:
  # Run tests on main just so the module and build cache can be saved and used
  # in PRs. This speeds up the time it takes to test PRs dramatically.
  # (More information on https://docs.github.com/en/enterprise-server@3.6/actions/using-workflows/caching-dependencies-to-speed-up-workflows)
  push:
    branches:
      - main
  pull_request:
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Go 1.23
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: false
    - run: sudo apt-get update -y && sudo apt-get install -y libsystemd-dev
    - run: make lint

  test_linux:
    name: Test Linux
    runs-on: ubuntu-latest
    container: grafana/alloy-build-image:v0.1.8
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Go 1.23
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: false
    - run: make GO_TAGS="nodocker" test

  test_macos:
    name: Test MacOS
    runs-on: macos-latest-xlarge
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Go 1.23
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: false
    - name: Test
      run: CGO_LDFLAGS="-ld_classic $CGO_LDFLAGS" make GO_TAGS="nodocker" test

  test_windows:
    # TODO: This should only be ran on pull_request
    name: Test Windows
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Go 1.23
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: false
    - name: Test
      run: '& "C:/Program Files/git/bin/bash.exe" -c ''go test -tags="nodocker,nonetwork"
        ./...'''

  test_linux_system_packages:
    name: Test Linux
    runs-on: ubuntu-latest
    container: grafana/alloy-build-image:v0.1.8
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Go 1.23
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: false
    - run: make GO_TAGS="nodocker" test