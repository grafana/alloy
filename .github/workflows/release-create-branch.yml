name: Create Release Branch

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.0'

permissions:
  id-token: write

env:
  ALLOYBOT_APP_NAME: grafana-alloybot

jobs:
  create-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Generate token 🔐
        uses: grafana/shared-workflows/actions/create-github-app-token@259ba21cb3ff07724f331e26d926d655d24b317b # create-github-app-token/v0.2.3
        id: app-token
        with:
          github_app: ${{ env.ALLOYBOT_APP_NAME }}

      - name: Checkout repository 🛎️
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Set up Go 🏗️
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: tools/go.mod
          cache-dependency-path: tools/go.sum
          cache: false

      - name: Run create-release-branch tool 🌿
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ env.ALLOYBOT_APP_NAME }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          cd tools
          go run ./release/create-release-branch --tag "${RELEASE_TAG}"
