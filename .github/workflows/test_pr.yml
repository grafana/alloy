name: Test PR
on:
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    uses: ./.github/workflows/lint.yml

  prebuild_tests:
    name: Prebuild test binaries
    runs-on: ubuntu-latest-8-cores
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod
        cache: false

    - run: make GO_TAGS="nodocker" prebuild-tests

    - name: Upload GOCACHE artifact
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: gocache
        path: ~/.cache/go-build
        retention-days: 1
        if-no-files-found: error
        include-hidden-files: true

  test_linux:
    name: Test Linux (shard ${{ matrix.shard }}/8)
    needs: prebuild_tests
    runs-on: ubuntu-latest-8-cores
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
          persist-credentials: false

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod
        cache: false

    - name: Restore prebuilt GOCACHE
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: gocache
        path: ~/.cache/go-build

    - run: make GO_TAGS="nodocker" SHARD=${{ matrix.shard }}/8 test
