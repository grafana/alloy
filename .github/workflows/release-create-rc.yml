name: Create Release Candidate

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (do not create tag or release)'
        type: boolean
        default: true # For safety!

permissions:
  id-token: write

env:
  ALLOYBOT_APP_NAME: grafana-alloybot

jobs:
  create-rc:
    runs-on: ubuntu-latest
    steps:
      - name: Generate token 🔐
        uses: grafana/shared-workflows/actions/create-github-app-token@46f48da11e78ebdba7a8747ae456b11062fac83e # create-github-app-token/v0.3.1
        id: app-token
        with:
          github_app: ${{ env.ALLOYBOT_APP_NAME }}

      - name: Validate branch format 🔎
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          if [[ "$BRANCH" != "main" && ! "$BRANCH" =~ ^release/v[0-9]+\.[0-9]+$ ]]; then
            echo "::error::This workflow must be run from main or a release branch (release/vX.Y)"
            echo "::error::Selected branch: $BRANCH"
            exit 1
          fi
          echo "✅ Running on branch: $BRANCH"
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Checkout repository 🛎️
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Set up Go 🏗️
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: tools/go.mod
          cache-dependency-path: tools/go.sum

      - name: Run create-rc tool 🚀
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: go run -C tools ./cmd release create-rc --branch "${GITHUB_REF_NAME}" ${{ inputs.dry_run == true && '--dry-run' || '' }}
