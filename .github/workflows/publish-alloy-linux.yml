name: Shared Linux container publish workflow

on:
  workflow_call:
    inputs:
      img-name:
        required: true
        type: string
      push:
        required: false
        type: boolean
        default: true
      dev:
        required: false
        type: boolean
        default: false
      pr-number:
        required: false
        type: string
        default: ""

permissions:
  contents: read
  id-token: write

jobs:
  publish_linux_container:
    name: Publish Alloy Linux container
    container: grafana/alloy-build-image:v0.1.31@sha256:9df765ac6d5d51afd0626ae9460f0f9b546baf32e1f4c3314a60c38654a44e60
    runs-on:
      labels: github-hosted-ubuntu-x64-large
    permissions:
      contents: read
      id-token: write
    steps:
      # This step needs to run before "Checkout code".
      # That's because it generates a new file.
      # We don't want this file to end up in the repo directory.
      # Then "scripts/image-tag" would get confused because "git status" no longer reports a clean repo.
    - name: Login to Google Artifact Registry
      uses: grafana/shared-workflows/actions/login-to-gar@c7ad5f57693ac858c698d95783685a9cbfd91223 # login-to-gar/v1.0.1
      with:
        registry: us-docker.pkg.dev

    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Tag dev
      if: ${{ inputs.dev }}
      run: |
        ./scripts/tag-dev

    - name: Set ownership
      # https://github.com/actions/runner/issues/2033#issuecomment-1204205989
      run: |
          # this is to fix GIT not liking owner of the checkout dir
          chown -R $(id -u):$(id -g) $PWD

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod
        cache: false

    - run: |
        docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
        docker buildx create --name multiarch-alloy-${IMG_NAME}-${GITHUB_SHA} --driver docker-container --use
        ./scripts/docker-containers ${IMG_NAME}
        docker buildx rm multiarch-alloy-${IMG_NAME}-${GITHUB_SHA}
      env:
        PUSH_ALLOY_IMAGE: ${{ inputs.push }}
        IMG_NAME: ${{ inputs.img-name }}
        GITHUB_PR_NUMBER: ${{ inputs.pr-number }}
