name: Shared Linux container publish workflow

on:
  workflow_call:
    inputs:
      img-name:
        required: true
        type: string
      push:
        required: false
        type: boolean
        default: true
      dev:
        required: false
        type: boolean
        default: false
      pr-number:
        required: false
        type: string
        default: ""
    outputs:
      image:
        description: "Digest-pinned ref of the pushed release image (e.g. <repo>@sha256:...). Empty when not pushed or for devel/PR builds."
        value: ${{ jobs.publish_linux_container.outputs.image }}

permissions:
  contents: read
  id-token: write

jobs:
  publish_linux_container:
    name: Publish Alloy Linux container
    container: grafana/alloy-build-image:v0.1.33@sha256:dbdecbfbad6c9ed0b315a7a6da25ef066b795ffc57e887125333b1a352907155
    runs-on:
      labels: github-hosted-ubuntu-x64-large
    permissions:
      contents: read
      id-token: write
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      # This step needs to run before "Checkout code".
      # That's because it generates a new file.
      # We don't want this file to end up in the repo directory.
      # Then "scripts/image-tag" would get confused because "git status" no longer reports a clean repo.
    - name: Login to Google Artifact Registry
      uses: grafana/shared-workflows/actions/login-to-gar@1f541877ceb22c7be7667d8a8df04984aeac9f9d # login-to-gar/v1.0.3
      with:
        registry: us-docker.pkg.dev

    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false

    - name: Tag dev
      if: ${{ inputs.dev }}
      run: |
        ./scripts/tag-dev

    - name: Set ownership
      # https://github.com/actions/runner/issues/2033#issuecomment-1204205989
      run: |
          # this is to fix GIT not liking owner of the checkout dir
          chown -R $(id -u):$(id -g) $PWD

    - id: build
      run: |
        docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
        docker buildx create --name multiarch-alloy-${IMG_NAME}-${GITHUB_SHA} --driver docker-container --use
        ./scripts/docker-containers ${IMG_NAME}
        docker buildx rm multiarch-alloy-${IMG_NAME}-${GITHUB_SHA}
      env:
        PUSH_ALLOY_IMAGE: ${{ inputs.push }}
        IMG_NAME: ${{ inputs.img-name }}
        GITHUB_PR_NUMBER: ${{ inputs.pr-number }}
