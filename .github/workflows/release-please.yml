name: Release Please

on:
  push:
    branches:
      - main
      - 'release/v*'

permissions:
  id-token: write

env:
  ALLOYBOT_APP_NAME: grafana-alloybot

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Generate token 🔐
        uses: grafana/shared-workflows/actions/create-github-app-token@46f48da11e78ebdba7a8747ae456b11062fac83e # create-github-app-token/v0.3.1
        id: app-token
        with:
          github_app: ${{ env.ALLOYBOT_APP_NAME }}

      - name: Checkout repository 🛎️
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Configure Git user
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ env.ALLOYBOT_APP_NAME }}
        run: |
          go run -C tools ./cmd release configure-git-user

      - name: Setup Node.js 🏗️
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: build-tools/release-please-runner/.nvmrc
          package-manager-cache: false

      - name: Install dependencies 📦
        working-directory: build-tools/release-please-runner
        run: npm ci --no-audit --no-fund

      - name: Run release-please 🚀
        working-directory: build-tools/release-please-runner
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO_URL: ${{ github.repository }}
          TARGET_BRANCH: ${{ github.ref_name }}
          CONFIG_FILE: release-please-config.json
          MANIFEST_FILE: .release-please-manifest.json
        run: node index.js

      - name: Find root release-please branch
        id: root-release-branch
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          RELEASE_BRANCH="release-please--branches--${GITHUB_REF_NAME}"
          echo "name=${RELEASE_BRANCH}" >> "${GITHUB_OUTPUT}"
          if ! git ls-remote --exit-code --heads origin "${RELEASE_BRANCH}" >/dev/null 2>&1; then
            echo "No root release-please branch ${RELEASE_BRANCH}; nothing to regenerate."
            echo "exists=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "exists=true" >> "${GITHUB_OUTPUT}"

      - name: Checkout root release-please branch 🛎️
        if: steps.root-release-branch.outputs.exists == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ steps.root-release-branch.outputs.name }}
          fetch-depth: 1
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true # Needed for subsequent git push.

      - name: Set up Go 🏗️
        if: steps.root-release-branch.outputs.exists == 'true'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Regenerate collector distro and stage changes
        if: steps.root-release-branch.outputs.exists == 'true'
        run: |
          make generate-otel-collector-distro

          if [ -z "$(git status --porcelain)" ]; then
            echo "Collector generation produced no diff; nothing to amend."
            exit 0
          fi

          git add .
          git commit --amend --no-edit
          git push --force-with-lease
