name: Release Please

on:
  push:
    branches:
      - main
      - 'release/v*'

permissions:
  id-token: write

env:
  ALLOYBOT_APP_NAME: grafana-alloybot

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Generate token 🔐
        uses: grafana/shared-workflows/actions/create-github-app-token@46f48da11e78ebdba7a8747ae456b11062fac83e # create-github-app-token/v0.3.1
        id: app-token
        with:
          github_app: ${{ env.ALLOYBOT_APP_NAME }}

      - name: Checkout repository 🛎️
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Setup tools 🛠️ # zizmor: ignore[cache-poisoning] Workflow does not directly create artifacts.
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          version: v2026.5.18
          sha256: cfac593469d028d7ae5fe36e37bd7c59118b5238e92d8a876209578464f24a84
          install_args: go node

      - name: Install dependencies 📦
        working-directory: build-tools/release-please-runner
        run: npm ci --no-audit --no-fund

      - name: Run release-please 🚀
        working-directory: build-tools/release-please-runner
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO_URL: ${{ github.repository }}
          TARGET_BRANCH: ${{ github.ref_name }}
          CONFIG_FILE: release-please-config.json
          MANIFEST_FILE: .release-please-manifest.json
        run: node index.js

      - name: Find root release-please branch 🔎
        id: root-release-branch
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          RELEASE_BRANCH="release-please--branches--${GITHUB_REF_NAME}"
          echo "name=${RELEASE_BRANCH}" >> "${GITHUB_OUTPUT}"
          if ! git fetch --depth=1 origin "refs/heads/${RELEASE_BRANCH}:refs/remotes/origin/${RELEASE_BRANCH}" >/dev/null 2>&1; then
            echo "No root release-please branch ${RELEASE_BRANCH}; nothing to regenerate."
            echo "exists=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "exists=true" >> "${GITHUB_OUTPUT}"

      - name: Switch to root release-please branch 🌿
        if: steps.root-release-branch.outputs.exists == 'true'
        env:
          RELEASE_BRANCH: ${{ steps.root-release-branch.outputs.name }}
        run: |
          git switch -C "${RELEASE_BRANCH}" "refs/remotes/origin/${RELEASE_BRANCH}"
          git status

      - name: Regenerate collector distro and commit changes 🏗️
        if: steps.root-release-branch.outputs.exists == 'true'
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_BRANCH: ${{ steps.root-release-branch.outputs.name }}
        run: |
          make generate-otel-collector-distro

          if [ -z "$(git status --porcelain)" ]; then
            echo "Collector generation produced no diff; nothing to commit."
            exit 0
          fi

          git add -- go.mod go.sum collector/
          go run -C tools ./cmd release commit-worktree \
            --branch "${RELEASE_BRANCH}" \
            --message "chore: Regenerate collector distro"
