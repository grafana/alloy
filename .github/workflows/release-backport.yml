# Automatically backports merged pull requests to release branches.
#
# When a PR labeled with one or more `backport/*` labels is merged into main, this
# workflow cherry-picks its commits onto the corresponding release branch(es) and
# opens a backport PR for each. It can also be run manually via workflow_dispatch
# for a specific PR number (useful when a backport label is added after merge).
name: Backport PR

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Number of the merged PR to backport"
        required: true

permissions:
  contents: read
  id-token: write

env:
  ALLOYBOT_APP_NAME: grafana-alloybot

jobs:
  # Decide whether there is anything to backport. 
  detect:
    if: github.repository == 'grafana/alloy'
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.pr-info.outputs.pr_number }}
      labels: ${{ steps.pr-info.outputs.labels }}
    steps:
      - name: Generate token 🔐
        uses: grafana/shared-workflows/actions/create-github-app-token@259ba21cb3ff07724f331e26d926d655d24b317b # create-github-app-token/v0.2.3
        id: app-token
        with:
          github_app: ${{ env.ALLOYBOT_APP_NAME }}

      - name: Resolve merged PR and backport labels 🏷️
        id: pr-info
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          PR_NUMBER_INPUT: ${{ github.event.inputs.pr_number }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            let prNumber;

            if (context.eventName === 'workflow_dispatch') {
              prNumber = parseInt(process.env.PR_NUMBER_INPUT, 10);
              if (Number.isNaN(prNumber)) {
                core.setFailed(`Invalid pr_number input: ${process.env.PR_NUMBER_INPUT}`);
                return;
              }
            } else {
              // Find the PR that the pushed commit belongs to.
              const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: context.sha,
              });
              const merged = prs.find(p => p.merged_at);
              if (!merged) {
                core.info(`No merged PR associated with commit ${context.sha}; nothing to backport.`);
                return;
              }
              prNumber = merged.number;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            if (!pr.merged) {
              core.setFailed(`PR #${prNumber} is not merged`);
              return;
            }

            const backportLabels = pr.labels
              .map(l => l.name)
              .filter(name => name.startsWith('backport/'));

            if (backportLabels.length === 0) {
              core.info(`PR #${prNumber} has no backport labels; nothing to backport.`);
              return;
            }

            console.log(`PR #${prNumber} is merged. Backport labels: ${backportLabels.join(', ')}`);
            core.setOutput('pr_number', String(prNumber));
            core.setOutput('labels', JSON.stringify(backportLabels));

  backport:
    needs: detect
    if: needs.detect.outputs.pr_number
    runs-on: ubuntu-latest
    steps:
      - name: Generate token 🔐
        uses: grafana/shared-workflows/actions/create-github-app-token@259ba21cb3ff07724f331e26d926d655d24b317b # create-github-app-token/v0.2.3
        id: app-token
        with:
          github_app: ${{ env.ALLOYBOT_APP_NAME }}

      - name: Checkout repository 🛎️
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          persist-credentials: true # Needed for subsequent git operations

      - name: Set up Go 🏗️
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: tools/go.mod
          cache-dependency-path: tools/go.sum

      - name: Run backport tool 🍒
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ env.ALLOYBOT_APP_NAME }}
          LABELS: ${{ needs.detect.outputs.labels }}
          PR_NUMBER: ${{ needs.detect.outputs.pr_number }}
        run: |
          # Use while-read loop to safely handle labels with special characters
          echo "${LABELS}" | jq -r '.[]' | while IFS= read -r label; do
            echo "🍒 Processing backport for label: $label"
            go run -C tools ./cmd release backport \
              --pr "${PR_NUMBER}" \
              --label "$label" || echo "⚠️ Backport for $label failed, moving to next..."
          done
