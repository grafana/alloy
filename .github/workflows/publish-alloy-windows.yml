name: Shared Windows container publish workflow

on:
  workflow_call:
    inputs:
      img-name:
        required: true
        type: string
      push:
        required: false
        type: boolean
        default: true
      dev:
        required: false
        type: boolean
        default: false
      pr-number:
        required: false
        type: string
        default: ""
      ref:
        required: false
        type: string
        default: ""
    outputs:
      image:
        description: "Digest-pinned ref of the pushed release image (e.g. <repo>@sha256:...). Empty when not pushed or for devel/PR builds."
        value: ${{ jobs.publish_windows_container.outputs.image }}

permissions:
  contents: read
  id-token: write

jobs:
  publish_windows_container:
    name: Publish Alloy Windows container
    runs-on: windows-2022
    permissions:
      contents: read
      id-token: write
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
    - name: Ensure Docker is running (Docker issue workaround)
      id: docker-workaround
      run: |
        $dockerState = Get-Service -Name "docker"
        if ($dockerState.Status -ne "Running") {
          Start-Service -Name "docker"
        }

      # This step needs to run before "Checkout code".
      # That's because it generates a new file.
      # We don't want this file to end up in the repo directory.
      # Then "scripts/image-tag" would get confused because "git status" no longer reports a clean repo.
    - name: Login to Google Artifact Registry
      uses: grafana/shared-workflows/actions/login-to-gar@c7ad5f57693ac858c698d95783685a9cbfd91223 # login-to-gar/v1.0.1
      with:
        registry: us-docker.pkg.dev

    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{ inputs.ref }}
        persist-credentials: false

    - name: Tag dev
      if: ${{ inputs.dev }}
      run: |
        & "C:/Program Files/git/bin/bash.exe" -c './scripts/tag-dev'

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod
        cache: false

    - name: Get Go version from go.mod
      id: get_go_version
      # Use only the major and minor versions.
      # Don't use the patch number, because those docker images sometimes get deleted.
      run: |
        $go_version = go mod edit -json | ConvertFrom-Json | select -exp Go
        $go_version_split = $go_version.ToString().split(".")
        $go_short_version = $go_version_split[0] + "." + $go_version_split[1]
        "alloy_go_version=$go_short_version" >> $env:GITHUB_OUTPUT

    - name: Build and publish the container
      id: build
      # TODO: Run "make alloy-image-windows" instead?
      run: |
        & "C:/Program Files/git/bin/bash.exe" -c 'PUSH_ALLOY_IMAGE=${SHOULD_PUSH_ALLOY_IMAGE} WINDOWS_VERSION=windows-2022 ALLOY_GO_VERSION=${GO_VERSION} ./scripts/docker-containers-windows ${IMG_NAME}'
      env:
        SHOULD_PUSH_ALLOY_IMAGE: ${{ inputs.push }}
        IMG_NAME: ${{ inputs.img-name }}
        GO_VERSION: ${{ steps.get_go_version.outputs.alloy_go_version }}
        GITHUB_PR_NUMBER: ${{ inputs.pr-number }}
