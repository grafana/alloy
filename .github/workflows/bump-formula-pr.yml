name: Bump Homebrew formula
on:
  release:
    types: [released]

permissions: {}

env:
  ALLOYBOT_APP_NAME: grafana-alloybot
  BREW_TAP_REPO: grafana/homebrew-grafana
  TAP_CHECKOUT_DIR: homebrew-grafana

jobs:
  # Gate prevents homebrew job execution for unreleased or component-level releases (e.g helm-chart or syntax).
  gate:
    name: gate
    runs-on: ubuntu-latest
    if: startsWith(github.event.release.tag_name, 'v')
    permissions:
      id-token: write
    outputs:
      is_latest: ${{ steps.compare.outputs.is_latest }}
    steps:
      - uses: grafana/shared-workflows/actions/create-github-app-token@46f48da11e78ebdba7a8747ae456b11062fac83e # create-github-app-token/v0.3.1
        id: app-token
        with:
          github_app: ${{ env.ALLOYBOT_APP_NAME }}
          permission_set: alloy

      - name: Get latest release
        uses: rez0n/actions-github-release@05fabbd6b2b3ce3383299555ea518faea69b736d # main
        id: latest_release
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: "${{ github.repository }}"
          type: "stable"

      # Report whether the triggering release is the latest stable release.
      - name: Compare with latest release
        id: compare
        env:
          LATEST_ID: ${{ steps.latest_release.outputs.release_id }}
          CURRENT_ID: ${{ github.event.release.id }}
        run: |
          if [ -z "$LATEST_ID" ]; then
            echo "::error::latest release lookup returned empty release_id" >&2
            exit 1
          fi
          echo "is_latest=$([ "$LATEST_ID" = "$CURRENT_ID" ] && echo true || echo false)" >> "${GITHUB_OUTPUT}"

  homebrew-grafana:
    name: homebrew-grafana
    needs: gate
    if: needs.gate.outputs.is_latest == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      # Token scoped to the Alloy repo, used to check out this repo.
      - uses: grafana/shared-workflows/actions/create-github-app-token@46f48da11e78ebdba7a8747ae456b11062fac83e # create-github-app-token/v0.3.1
        id: app-token
        with:
          github_app: ${{ env.ALLOYBOT_APP_NAME }}
          permission_set: alloy

      # Token scoped to the homebrew-grafana tap, used to check out the tap and open the PR.
      - uses: grafana/shared-workflows/actions/create-github-app-token@46f48da11e78ebdba7a8747ae456b11062fac83e # create-github-app-token/v0.3.1
        id: app-token-homebrew
        with:
          github_app: ${{ env.ALLOYBOT_APP_NAME }}
          permission_set: homebrew

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Checkout Grafana Homebrew Tap
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: ${{ env.BREW_TAP_REPO }}
          token: ${{ steps.app-token-homebrew.outputs.token }}
          persist-credentials: false
          ref: master
          path: ${{ env.TAP_CHECKOUT_DIR }}

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: packaging/homebrew/formula-gen/go.mod
          cache: false

      # Render formula from a template. Checksums are fetched from release's SHA256SUMS asset.
      - name: Generate Formula
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          go run -C packaging/homebrew/formula-gen/ . \
            -tag "$RELEASE_TAG" \
            -out "$GITHUB_WORKSPACE/$TAP_CHECKOUT_DIR/alloy.rb"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.app-token-homebrew.outputs.token }}
          path: ${{ env.TAP_CHECKOUT_DIR }}
          base: master
          branch: "${{ env.ALLOYBOT_APP_NAME }}/bump-alloy-${{ github.event.release.tag_name }}"
          title: "alloy ${{ github.event.release.tag_name }}"
          body: "Automated formula bump for Alloy ${{ github.event.release.tag_name }}."
          committer: "${{ env.ALLOYBOT_APP_NAME }}[bot] <879451+${{ env.ALLOYBOT_APP_NAME }}[bot]@users.noreply.github.com>"
          commit-message: "Bump alloy to ${{ github.event.release.tag_name }}"
          sign-commits: true
          delete-branch: true
