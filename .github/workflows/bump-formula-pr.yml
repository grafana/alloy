name: bump-formula-pr
on:
  release:
    types: [released]

permissions: {}

env:
  ALLOYBOT_APP_NAME: grafana-alloybot

jobs:
  homebrew-grafana:
    name: homebrew-grafana
    runs-on: ubuntu-latest
    # These permissions are needed to assume roles from Github's OIDC.
    permissions:
      id-token: write
    steps:
    # TODO: Remove this when we no longer need a forked action in the "Update Homebrew formula" step.
    - uses: grafana/shared-workflows/actions/create-github-app-token@46f48da11e78ebdba7a8747ae456b11062fac83e # create-github-app-token/v0.3.1
      id: app-token
      with:
        github_app: ${{ env.ALLOYBOT_APP_NAME }}
        permission_set: alloy

    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        token: ${{ steps.app-token.outputs.token }}
        persist-credentials: false

    - name: Get GitHub App
      env:
        APP_SLUG: ${{ env.ALLOYBOT_APP_NAME }}
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
      id: get-app
      run: |
        APP_ID="$(gh api "/apps/${APP_SLUG}" --jq .id)" || exit 1
        echo "app-id=${APP_ID}" >> "${GITHUB_OUTPUT}"
        echo "app-login=${APP_SLUG}[bot]" >> "${GITHUB_OUTPUT}"

    - name: Configure Git
      env:
        APP_ID: ${{ steps.get-app.outputs.app-id }}
        APP_LOGIN: ${{ steps.get-app.outputs.app-login }}
      run: |
        git config --global user.name "${APP_LOGIN}"
        git config --global user.email "${APP_ID}+${APP_LOGIN}@users.noreply.github.com"

    - name: Get latest release
      uses: rez0n/actions-github-release@05fabbd6b2b3ce3383299555ea518faea69b736d # main
      id: latest_release
      with:
        token: ${{ steps.app-token.outputs.token }}
        repository: "${{ github.repository }}"
        type: "stable"

    - name: Update Homebrew formula
      # Only the Alloy binary (vX.Y.Z tags) has a Homebrew formula. The release_id
      # check alone doesn't exclude component releases (e.g. syntax/v0.2.0):
      # GitHub's "latest stable" is the component release at publish time.
      if: steps.latest_release.outputs.release_id == github.event.release.id && startsWith(github.event.release.tag_name, 'v')
      uses: dawidd6/action-homebrew-bump-formula@a0e064e08103c01870c6d1b05168d1b726aab119 # dawidd6/action-homebrew-bump-formula@v8
      with:
        # Required, custom GitHub access token with the 'public_repo' and 'workflow' scopes
        token: ${{ steps.app-token.outputs.token }}
        # Optional, defaults to homebrew/core
        tap: grafana/grafana
        # Formula name, required
        formula: alloy
        # Optional, will be determined automatically
        tag: ${{github.ref}}
        # Optional, will be determined automatically
        revision: ${{github.sha}}
        # Optional, if don't want to check for already open PRs
        force: false # true
        user_name: ${{ env.ALLOYBOT_APP_NAME }}[bot]
        user_email: 879451+${{ env.ALLOYBOT_APP_NAME }}[bot]@users.noreply.github.com
