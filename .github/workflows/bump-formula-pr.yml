name: bump-formula-pr
on:
  release:
    types: [released]

permissions: {}

env:
  ALLOYBOT_APP_NAME: grafana-alloybot
  BREW_TAP_REPO: grafana/homebrew-grafana
  TAP_CHECKOUT_DIR: homebrew-grafana

jobs:
  homebrew-grafana:
    name: homebrew-grafana
    runs-on: ubuntu-latest
    # Only normal Alloy releases use semver `vX.Y.Z` tags and have a Homebrew formula.
    # Component releases (e.g. `syntax/v0.2.0`, `helm-chart/1.2.3`) also fire this event - skip them.
    # The "is this the latest stable release?" check additionally gates the steps below (it needs the latest_release step).
    if: startsWith(github.event.release.tag_name, 'v')
    permissions:
      id-token: write
    steps:
      - uses: grafana/shared-workflows/actions/create-github-app-token@46f48da11e78ebdba7a8747ae456b11062fac83e # create-github-app-token/v0.3.1
        id: app-token
        with:
          github_app: ${{ env.ALLOYBOT_APP_NAME }}
          permission_set: alloy

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Get GitHub App
        env:
          APP_SLUG: ${{ env.ALLOYBOT_APP_NAME }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        id: get-app
        run: |
          APP_ID="$(gh api "/apps/${APP_SLUG}" --jq .id)" || exit 1
          echo "app-id=${APP_ID}" >> "${GITHUB_OUTPUT}"
          echo "app-login=${APP_SLUG}[bot]" >> "${GITHUB_OUTPUT}"

      - name: Configure Git
        env:
          APP_ID: ${{ steps.get-app.outputs.app-id }}
          APP_LOGIN: ${{ steps.get-app.outputs.app-login }}
        run: |
          git config --global user.name "${APP_LOGIN}"
          git config --global user.email "${APP_ID}+${APP_LOGIN}@users.noreply.github.com"

      - name: Get latest release
        uses: rez0n/actions-github-release@05fabbd6b2b3ce3383299555ea518faea69b736d # main
        id: latest_release
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: "${{ github.repository }}"
          type: "stable"

      # Only bump the formula for the current latest stable release. `github.com`'s
      # "latest stable" is the component release at publish time, so a `v`-tagged
      # release that isn't the newest (e.g. a patch to an old minor) is skipped.
      # This condition gates every step below.
      - name: Checkout Grafana Homebrew Tap
        if: steps.latest_release.outputs.release_id == github.event.release.id
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: ${{ env.BREW_TAP_REPO }}
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false
          ref: master
          path: ${{ env.TAP_CHECKOUT_DIR }}

      - name: Set up Go
        if: steps.latest_release.outputs.release_id == github.event.release.id
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: packaging/homebrew/formula-gen/go.mod
          cache: false

      # Renders packaging/homebrew/alloy.rb.tpl into the tap's alloy.rb. The
      # generator reads GITHUB_SERVER_URL and GITHUB_REPOSITORY (set by the
      # runner) to build the release download URLs, and fetches the checksums
      # from the release's SHA256SUMS asset.
      - name: Generate Formula
        if: steps.latest_release.outputs.release_id == github.event.release.id
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          go run -C packaging/homebrew/formula-gen/ . \
            -tag "$RELEASE_TAG" \
            -out "$GITHUB_WORKSPACE/$TAP_CHECKOUT_DIR/alloy.rb"

      - name: Create Pull Request
        if: steps.latest_release.outputs.release_id == github.event.release.id
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          path: ${{ env.TAP_CHECKOUT_DIR }}
          base: master
          branch: "${{ env.ALLOYBOT_APP_NAME }}/bump-alloy-${{ github.event.release.tag_name }}"
          title: "alloy ${{ github.event.release.tag_name }}"
          body: "Automated formula bump for Alloy ${{ github.event.release.tag_name }}."
          committer: "${{ env.ALLOYBOT_APP_NAME }}[bot] <879451+${{ env.ALLOYBOT_APP_NAME }}[bot]@users.noreply.github.com>"
          commit-message: "Bump alloy to ${{ github.event.release.tag_name }}"
          sign-commits: true
          delete-branch: true
