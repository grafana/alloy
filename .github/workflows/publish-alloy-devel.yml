name: Publish alloy-devel containers
on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  UPDATER_APP_NAME: updater-for-ci
  UPDATER_BOT_EMAIL: 119986603+updater-for-ci[bot]@users.noreply.github.com
  UPDATER_BOT_NAME: updater-for-ci[bot]

jobs:
  publish_linux_container:
    uses: ./.github/workflows/publish-alloy-linux.yml
    permissions:
      contents: read
      id-token: write
    with:
      img-name: alloy-devel
      dev: true

  publish_linux_boringcrypto_container:
    uses: ./.github/workflows/publish-alloy-linux.yml
    permissions:
      contents: read
      id-token: write
    with:
      img-name:  alloy-devel-boringcrypto
      dev: true

  publish_windows_container:
    uses: ./.github/workflows/publish-alloy-windows.yml
    permissions:
      contents: read
      id-token: write
    with:
      img-name: alloy-devel
      dev: true

  sign_linux_container:
    needs: publish_linux_container
    if: ${{ needs.publish_linux_container.outputs.image != '' }}
    uses: ./.github/workflows/sign-and-attest.yml
    permissions:
      contents: read
      id-token: write
    with:
      image: ${{ needs.publish_linux_container.outputs.image }}

  sign_linux_boringcrypto_container:
    needs: publish_linux_boringcrypto_container
    if: ${{ needs.publish_linux_boringcrypto_container.outputs.image != '' }}
    uses: ./.github/workflows/sign-and-attest.yml
    permissions:
      contents: read
      id-token: write
    with:
      image: ${{ needs.publish_linux_boringcrypto_container.outputs.image }}

  sign_windows_container:
    needs: publish_windows_container
    if: ${{ needs.publish_windows_container.outputs.image != '' }}
    uses: ./.github/workflows/sign-and-attest.yml
    permissions:
      contents: read
      id-token: write
    with:
      image: ${{ needs.publish_windows_container.outputs.image }}

  update_deployment_tools:
    name: Update deployment_tools
    runs-on: ubuntu-latest
    needs:
    - publish_linux_container
    - publish_linux_boringcrypto_container
    permissions:
      contents: read
      id-token: write
    steps:

    - name: Generate token 🔐
      uses: grafana/shared-workflows/actions/create-github-app-token@46f48da11e78ebdba7a8747ae456b11062fac83e # create-github-app-token/v0.3.1
      id: app-token
      with:
        github_app: ${{ env.UPDATER_APP_NAME }}

    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false

    - name: Get the image tag
      id: get-tag
      run: |
        TAG="$(bash ./scripts/image-tag-docker)"
        echo "${TAG}" > .tag-only
        echo "grafana/alloy-dev:${TAG}" > .image-tag
        echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      # This step needs to run after "Get the image tag".
      # That's because the login to GAR generates a new file.
      # We don't want this file to end up in the repo directory.
      # Then "scripts/image-tag" would get confused because "git status" no longer reports a clean repo.
    - name: Log in to Google Artifact Registry
      uses: grafana/shared-workflows/actions/login-to-gar@1f541877ceb22c7be7667d8a8df04984aeac9f9d # login-to-gar/v1.0.3
      with:
        registry: us-docker.pkg.dev

    - name: Wait for image to mirror to DockerHub
      uses: grafana/shared-workflows/actions/wait-for-docker-publish@cd185787ec303639a71383384e1b0d424b7422fb # wait-for-docker-publish/v0.2.0
      with:
        image: grafana/alloy-dev:${{ steps.get-tag.outputs.tag }}
        timeout: 10m

    - name: Update to latest image
      run: |
        set -e -o pipefail

        echo "The image tag is: $(cat .image-tag)"

        cat << EOF > config.json
        {
          "git_committer_name": "${UPDATER_BOT_NAME}",
          "git_author_name": "${UPDATER_BOT_NAME}",
          "git_committer_email": "${UPDATER_BOT_EMAIL}",
          "git_author_email": "${UPDATER_BOT_EMAIL}",
          "destination_branch": "master",
          "pull_request_branch_prefix": "auto-merge/updater/alloy",
          "pull_request_enabled": true,
          "pull_request_existing_strategy": "replace",
          "pull_request_message": "Created by https://github.com/grafana/alloy/actions/runs/${{ github.run_id }}. This PR will auto-merge once CI has passed.",
          "pull_request_team_reviewers": [],
          "repo_name": "deployment_tools",
          "update_jsonnet_attribute_configs": [
            {
              "file_path": "ksonnet/lib/alloy/waves/alloy.libsonnet",
              "jsonnet_key": "dev0",
              "jsonnet_value_file": ".image-tag"
            }
          ]
        }
        EOF

        docker run --rm \
          -e GITHUB_TOKEN \
          -e CONFIG_JSON="$(cat config.json)" \
          -v ./.image-tag:/app/.image-tag \
          us-docker.pkg.dev/grafanalabs-global/docker-deployment-tools-prod/updater |& tee updater-output.log
      env:
        GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
