name: Integration Tests on Kubernetes
on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  # Build the docker images the test suite needs (Alloy under test, plus
  # prom-gen as a scrape-target fixture) once and ship them as a single
  # artifact, so each shard in run_tests just docker-loads them instead of
  # rebuilding.
  build_images:
    runs-on:
      labels: github-hosted-ubuntu-x64-large
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        persist-credentials: false
    - name: Setup Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
      with:
        go-version-file: go.mod
    - name: Build Alloy image
      run: make alloy-image
    - name: Build prom-gen image
      run: make prom-gen-image
    - name: Save images
      run: docker save grafana/alloy:latest prom-gen:latest -o test-images.tar
    - name: Upload images artifact
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: test-images
        path: test-images.tar
        retention-days: 1

  run_tests:
    needs: [build_images]
    strategy:
      fail-fast: false
      matrix:
        shard: ["0/2", "1/2"]
    runs-on:
      labels: github-hosted-ubuntu-x64-large
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        persist-credentials: false
    - name: Setup Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
      with:
        go-version-file: go.mod
    - name: Install Helm
      uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
      with:
        version: v3.14.4
    - name: Install kind
      run: |
        curl -Lo ./kind "https://kind.sigs.k8s.io/dl/v0.24.0/kind-linux-amd64"
        chmod +x ./kind
        sudo mv ./kind /usr/local/bin/kind
    - name: Download images artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: test-images
    - name: Load images
      run: docker load -i test-images.tar
    - name: Run tests
      run: make integration-test-k8s RUN_ARGS="--skip-image-builds --shard ${{ matrix.shard }}"
