name: Integration Tests on Kubernetes
on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  # Build the docker images the test suite needs (Alloy under test, plus
  # prom-gen as a scrape-target fixture) once and ship them as a single
  # artifact, so each shard in run_tests just docker-loads them instead of
  # rebuilding.
  build_images:
    runs-on:
      labels: github-hosted-ubuntu-x64-large
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      with:
        persist-credentials: false
    - name: Setup tools
      uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      with:
        version: v2026.5.18
        sha256: cfac593469d028d7ae5fe36e37bd7c59118b5238e92d8a876209578464f24a84
        install_args: go
    - name: Build Alloy image
      run: make alloy-image
    - name: Build prom-gen image
      run: make prom-gen-image
    - name: Save images
      run: docker save grafana/alloy:latest prom-gen:latest -o test-images.tar
    - name: Upload images artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: test-images
        path: test-images.tar
        retention-days: 1

  run_tests:
    needs: [build_images]
    strategy:
      fail-fast: false
      matrix:
        shard: ["0/2", "1/2"]
    runs-on:
      labels: github-hosted-ubuntu-x64-large
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      with:
        persist-credentials: false
    - name: Setup tools
      uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      with:
        version: v2026.5.18
        sha256: cfac593469d028d7ae5fe36e37bd7c59118b5238e92d8a876209578464f24a84
        install_args: go helm kind
    - name: Download images artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: test-images
    - name: Load images
      run: docker load -i test-images.tar
    - name: Run tests
      run: make integration-test-k8s RUN_ARGS="--skip-image-builds --shard ${{ matrix.shard }}"
