name: Snyk Monitor Scanning
on:
  release:
    types: [published]
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snyk-scan-ci:
    uses: grafana/security-github-actions/.github/workflows/snyk_monitor.yml@8b10f82433323c48383277b3abc8c87d26564e63 # main
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
