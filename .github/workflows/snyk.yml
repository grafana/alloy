name: Snyk Monitor Scanning
on:
  release:
    types: [published]
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snyk-scan-ci:
    uses: grafana/security-github-actions/.github/workflows/snyk_monitor.yml@5cf1ca2bf60978cbf7d5bbcb4538fc3afec3179b # main
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
