name: Release Semantics - Branch Versions

on:
  pull_request:
    branches:
      - main
      - 'release/v*'

concurrency:
  group: "${{ github.ref_name }}-${{ github.head_ref }}-wrong-version-on-branch-guard"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: No patch releases on main
    runs-on: ubuntu-latest
    steps:
      - name: Check for patch release on main 🔎
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Only check release-please PR
          if ! echo "$PR_TITLE" | grep -qE '^chore\(main\): Release'; then
            echo "✅ Not a release-please PR. Skipping."
            exit 0
          fi

          # Extract version from title (e.g., "chore(main): Release 1.29.1" -> "1.29.1")
          VERSION=$(echo "$PR_TITLE" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          if [ -z "$VERSION" ]; then
            echo "⚠️ Could not extract version from PR title: $PR_TITLE"
            exit 1
          fi

          echo "Detected release version: $VERSION"

          # Check if it's a patch release (doesn't end in .0)
          if echo "$VERSION" | grep -qE '\.[1-9][0-9]*$'; then
            echo "❌ ERROR: Patch release v$VERSION cannot be merged to main."
            echo ""
            echo "Patch releases must be created from a release branch."
            echo "Use the release/v$(echo "$VERSION" | grep -oE '^[0-9]+\.[0-9]+') branch instead."
            echo ""
            exit 1
          fi

          echo "✅ Minor release v$VERSION is allowed on main."
