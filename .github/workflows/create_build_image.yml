name: Create build images
on:
  push:
    tags:
      - build-image/v*

permissions:
  contents: read
  id-token: write

jobs:
  linux_build_image:
    name: Create a Linux build image
    strategy:
      matrix:
        build:
          - runtime: golang:1.25.8-alpine3.23
          - runtime: mcr.microsoft.com/oss/go/microsoft/golang:1.25.8-bookworm
            suffix: "-boringcrypto"
    runs-on: ubuntu-latest-8-cores
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Remove unnecessary files
      run: |
          rm -rf /usr/share/dotnet
          rm -rf "$AGENT_TOOLSDIRECTORY"
          rm -rf /opt/ghc
          rm -rf "/usr/local/share/boost"
          rm -rf /opt/hostedtoolcache

    - name: Get version from Git tag
      env:
        FULL_TAG: ${{ github.ref_name }}
      id: get_image_version
      run: echo "image_tag=${FULL_TAG##*/}${{ matrix.build.suffix }}" >> $GITHUB_OUTPUT

    - name: Login to DockerHub (from vault)
      uses: grafana/shared-workflows/actions/dockerhub-login@081a366728379fd0426b9cfef190e9a21c2d5418 # dockerhub-login/v1.0.3

    - name: Setup QEMU
      uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

    - name: Create Linux build image
      uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
      with:
        platforms: linux/amd64,linux/arm64
        context: ./tools/build-image
        push: true
        tags: grafana/alloy-build-image:${{ steps.get_image_version.outputs.image_tag }}
        build-args: |
          GO_RUNTIME=${{ matrix.build.runtime }}
