name: Enrich Release Notes with Contributors

on:
  release:
    types: [published]

permissions:
  id-token: write

env:
  ALLOYBOT_APP_NAME: grafana-alloybot

jobs:
  enrich-release:
    runs-on: ubuntu-latest
    steps:
      - name: Generate token 🔐
        uses: grafana/shared-workflows/actions/create-github-app-token@46f48da11e78ebdba7a8747ae456b11062fac83e # create-github-app-token/v0.3.1
        id: app-token
        with:
          github_app: ${{ env.ALLOYBOT_APP_NAME }}

      - name: Checkout repository 🛎️
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Set up Go 🏗️
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: tools/go.mod
          cache-dependency-path: tools/go.sum
          cache: false

      - name: Enrich release notes 🙋
        run: go run -C tools ./cmd release enrich-release-notes --tag "${RELEASE_TAG_NAME}" --footer release/release-notes-footer.md
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
