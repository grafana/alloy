name: Trigger Rollout

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.14.0)'
        required: true
        default: ''
        type: string

jobs:
  trigger-argo-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Set short SHA
        id: short-sha
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            SHORT_SHA="${GITHUB_SHA::7}"
          else
          # use tag-based suffix for uniqueness, so we can run multiple workflows off the same commit manually
            SHORT_SHA="manual-${GITHUB_RUN_ID}"
          fi
          echo "sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Extract tag name
        id: tag
        run: |
          TAG_NAME="${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.tag }}"
          echo "tag=${TAG_NAME}" >> $GITHUB_OUTPUT
          echo "Detected tag: ${TAG_NAME}"

      - name: Verify tag format
        run: |
          TAG_NAME="${{ steps.tag.outputs.tag }}"
          if ! echo "${TAG_NAME}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid tag format: ${TAG_NAME}. Expected tag in format vX.Y.Z (no additional prefix/suffix)."
            exit 1
          fi
          echo "Tag format valid: ${TAG_NAME}"

      - name: Trigger ArgoCD Workflow
        uses: grafana/shared-workflows/actions/trigger-argo-workflow@a37de51f3d713a30a9e4b21bcdfbd38170020593 # v1.3.0
        with:
          instance: "ops"
          namespace: "alloy-cd"
          workflow_template: "alloy"
          parameters: |
            dockertag=${{ steps.tag.outputs.tag }}
            imageName=grafana/alloy
            prCommentContext=This deployment was triggered by publishing release ${{ steps.tag.outputs.tag }}.
            commit_author=${{ github.actor }}
            commit_link=https://github.com/${{ github.repository }}/commit/${{ github.sha }}
          extra_args: "--name alloy-${{ steps.short-sha.outputs.sha }}"
