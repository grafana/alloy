name: Trigger Rollout

on:
  push:
    tags:
      - 'v*'

jobs:
  trigger-argo-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Set short SHA
        id: short-sha
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Extract tag name
        id: tag
        run: |
          # Remove 'refs/tags/' prefix if present
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "tag=${TAG_NAME}" >> $GITHUB_OUTPUT
          echo "Detected tag: ${TAG_NAME}"

      - name: Verify tag format
        run: |
          TAG_NAME="${{ steps.tag.outputs.tag }}"
          if ! echo "${TAG_NAME}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid tag format: ${TAG_NAME}. Expected tag in format vX.Y.Z (no additional prefix/suffix)."
            exit 1
          fi
          echo "Tag format valid: ${TAG_NAME}"

      - name: Trigger ArgoCD Workflow
        uses: grafana/shared-workflows/actions/trigger-argo-workflow@a37de51f3d713a30a9e4b21bcdfbd38170020593 # v1.3.0
        with:
          instance: "ops"
          namespace: "alloy-cd"
          workflow_template: "alloy"
          parameters: |
            dockertag=${{ steps.tag.outputs.tag }}
            imageName=grafana/alloy
            prCommentContext=This deployment was triggered by pushing tag ${{ steps.tag.outputs.tag }}.
            commit_author=${{ github.actor }}
            commit_link=https://github.com/${{ github.repository }}/commit/${{ github.sha }}
          extra_args: "--name alloy-${{ steps.short-sha.outputs.sha }}"
