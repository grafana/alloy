name: Trigger Rollout

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.14.0)'
        required: true
        default: ''
        type: string

jobs:
  trigger-argo-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      TAG_NAME: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.tag }}
      EVENT_NAME: ${{ github.event_name }}
    steps:
      - name: Set short SHA
        id: short-sha
        run: |
          if [ "$EVENT_NAME" = "release" ]; then
            SHORT_SHA="${GITHUB_SHA::7}"
          else
            SHORT_SHA="manual-${GITHUB_RUN_ID}"
          fi
          echo "sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Extract tag name
        id: tag
        run: |
          echo "tag=${TAG_NAME}" >> $GITHUB_OUTPUT
          echo "Detected tag: ${TAG_NAME}"

      - name: Check tag format
        id: validate
        run: |
          if echo "${TAG_NAME}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+(-rc[0-9]+)?$'; then
            echo "is_alloy=true" >> $GITHUB_OUTPUT
            echo "Valid alloy tag detected: ${TAG_NAME}, proceeding with ArgoCD deployment"
          else
            echo "is_alloy=false" >> $GITHUB_OUTPUT
            echo "::notice::Tag '${TAG_NAME}' does not match vX.Y.Z or vX.Y.Z-rcN format. Skipping ArgoCD deployment"
          fi

      - name: Trigger ArgoCD Workflow
        if: steps.validate.outputs.is_alloy == 'true'
        uses: grafana/shared-workflows/actions/trigger-argo-workflow@a37de51f3d713a30a9e4b21bcdfbd38170020593 # v1.3.0
        with:
          instance: "ops"
          namespace: "alloy-cd"
          workflow_template: "alloy"
          parameters: |
            dockertag=${{ steps.tag.outputs.tag }}
            imageName=grafana/alloy
            prCommentContext=This deployment was triggered by publishing release ${{ steps.tag.outputs.tag }}.
            commit_author=${{ github.actor }}
            commit_link=https://github.com/${{ github.repository }}/commit/${{ github.sha }}
          extra_args: "--name alloy-${{ steps.short-sha.outputs.sha }}"
