apiVersion: v1
kind: Secret
metadata:
  name: security-poc-flags
  namespace: monitoring
stringData:
  # Dummy secret used as a capture-the-flag target for security POC work.
  # Using a Secret (not a ConfigMap) demonstrates that Kubernetes Secrets are
  # still accessible as plaintext to anything that can read the pod filesystem —
  # they are base64-encoded, not encrypted.
  SECRET_2: secret_value_flag_2
