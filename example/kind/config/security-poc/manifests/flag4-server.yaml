apiVersion: v1
kind: ConfigMap
metadata:
  name: internal-api-script
  namespace: monitoring
data:
  # Tiny stdlib-only HTTP server. Flag 4 is the body returned by the
  # /internal-endpoint route; everything else returns 404.
  server.py: |
    from http.server import BaseHTTPRequestHandler, HTTPServer

    FLAG = "flag_4"

    class Handler(BaseHTTPRequestHandler):
        def _respond(self, status, body):
            data = body.encode()
            self.send_response(status)
            self.send_header("Content-Type", "text/plain")
            self.send_header("Content-Length", str(len(data)))
            self.end_headers()
            self.wfile.write(data)

        def do_GET(self):
            if self.path == "/internal-endpoint":
                self._respond(200, FLAG)
            elif self.path == "/quitquitquit":
                # Unauthenticated shutdown route, modelling a DoS vector.
                # Returns a dummy response only; the server keeps running.
                self._respond(200, "shutting down critical server")
            else:
                self.send_response(404)
                self.end_headers()

        def log_message(self, *args):
            pass

    if __name__ == "__main__":
        HTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
---
apiVersion: v1
kind: Pod
metadata:
  name: internal-api
  namespace: monitoring
  labels:
    app: internal-api
spec:
  containers:
    - name: server
      image: python:3.12-alpine
      command: ["python", "/app/server.py"]
      ports:
        - containerPort: 8080
      volumeMounts:
        - name: script
          mountPath: /app
          readOnly: true
  volumes:
    - name: script
      configMap:
        name: internal-api-script
---
apiVersion: v1
kind: Service
metadata:
  name: internal-api
  namespace: monitoring
spec:
  selector:
    app: internal-api
  ports:
    - port: 8080
      targetPort: 8080
