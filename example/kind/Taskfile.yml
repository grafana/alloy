# Install the task command from here: https://taskfile.dev
# It's a much more human-friendly version of Makefiles.

version: "3"

dotenv:
  - .env.credentials

vars:
  KUBECONFIG: build/kubeconfig.yaml
  CLUSTERNAME: alloy-example

tasks:
  cluster:create:
    desc: Create the kind cluster (idempotent)
    run: once
    status:
      - test -f {{.KUBECONFIG}} && kubectl --kubeconfig {{.KUBECONFIG}} cluster-info &>/dev/null
    cmds:
      - mkdir -p build
      - kind create cluster --config config/kind/multinode.yaml --name {{.CLUSTERNAME}} --kubeconfig {{.KUBECONFIG}}

  cluster:delete:
    desc: Destroy the kind cluster and remove the kubeconfig
    run: once
    cmds:
      - kind delete cluster --name {{.CLUSTERNAME}}
      - rm -rf {{.KUBECONFIG}}

  update-helm-repos:
    desc: Add and update Grafana / OTel helm repos
    run: once
    cmds:
      - helm repo add grafana https://grafana.github.io/helm-charts
      - helm repo add open-telemetry https://open-telemetry.github.io/opentelemetry-helm-charts
      - helm repo update

  run:security-poc-loki-receiver:
    desc: Run a local Alloy receiver (loki.source.api → loki.echo) to print exfiltrated data
    vars:
      ALLOY_BIN: '{{.ALLOY_BIN | default (printf "%s/../../build/alloy" .ROOT_DIR)}}'
      RECEIVER_CONFIG: '{{.ROOT_DIR}}/security-poc/receiver.alloy'
    preconditions:
      - sh: test -x {{.ALLOY_BIN}}
        msg: "Alloy binary not found at {{.ALLOY_BIN}} — run 'SKIP_UI_BUILD=1 make alloy' first, or set ALLOY_BIN=/path/to/alloy"
      - test -f {{.RECEIVER_CONFIG}}
    cmds:
      - '{{.ALLOY_BIN}} run --server.http.listen-addr=0.0.0.0:12346 {{.RECEIVER_CONFIG}}'

  deploy:alloy-helm:
    desc: Deploy the local Alloy helm chart (non-POC, basic values)
    deps: [cluster:create]
    vars:
      ALLOY_VALUES_FILE: '{{.ALLOY_VALUES_FILE | default "config/alloy-helm/basic.yaml"}}'
      ALLOY_CHART_PATH: '{{.ROOT_DIR}}/../../operations/helm/charts/alloy'
    preconditions:
      - test -f {{.ALLOY_VALUES_FILE}}
    cmds:
      - helm --kubeconfig {{.KUBECONFIG}} upgrade --install alloy {{.ALLOY_CHART_PATH}}
        -n monitoring --create-namespace
        -f {{.ALLOY_VALUES_FILE}}
        --wait

  deploy:security-poc:
    desc: Deploy all security POC resources (Alloy, flags, config-server, user-pipeline no-op)
    deps: [cluster:create]
    vars:
      ALLOY_VALUES_FILE: '{{.ROOT_DIR}}/config/security-poc/values.yaml'
      ALLOY_CHART_PATH: '{{.ROOT_DIR}}/../../operations/helm/charts/alloy'
      MANIFESTS_DIR: '{{.ROOT_DIR}}/config/security-poc/manifests'
    preconditions:
      - test -f {{.ALLOY_VALUES_FILE}}
      - test -d {{.MANIFESTS_DIR}}
    cmds:
      - kubectl --kubeconfig {{.KUBECONFIG}} create namespace monitoring --dry-run=client -o yaml | kubectl --kubeconfig {{.KUBECONFIG}} apply -f -
      - kubectl --kubeconfig {{.KUBECONFIG}} apply -f {{.MANIFESTS_DIR}}
      # Roll config-server so it serves the just-applied user-pipeline content
      # immediately, instead of waiting for the kubelet ConfigMap sync (~1 min).
      # Harmless on a first install (the Deployment is brand new anyway).
      - kubectl --kubeconfig {{.KUBECONFIG}} -n monitoring rollout restart deployment/config-server
      - kubectl --kubeconfig {{.KUBECONFIG}} -n monitoring rollout status deployment/config-server --timeout=60s
      - helm --kubeconfig {{.KUBECONFIG}} upgrade --install alloy {{.ALLOY_CHART_PATH}}
        -n monitoring --create-namespace
        -f {{.ALLOY_VALUES_FILE}}
        --wait

  deploy:security-poc:user-pipeline:
    desc: Apply user-pipeline.yaml (no-op baseline) and roll config-server
    deps: [cluster:create]
    vars:
      USER_PIPELINE_FILE: '{{.ROOT_DIR}}/config/security-poc/manifests/user-pipeline.yaml'
    preconditions:
      - test -f {{.USER_PIPELINE_FILE}}
    cmds:
      # Substitute TIMESTAMP with the current Unix epoch before applying so
      # every deploy gets a unique loki.source.file positions-file key,
      # forcing a re-read from the start of the file automatically.
      - sed "s/TIMESTAMP/$(date +%s)/g" {{.USER_PIPELINE_FILE}} | kubectl --kubeconfig {{.KUBECONFIG}} apply -f -
      - kubectl --kubeconfig {{.KUBECONFIG}} -n monitoring rollout restart deployment/config-server
      - kubectl --kubeconfig {{.KUBECONFIG}} -n monitoring rollout status deployment/config-server --timeout=60s

  deploy:security-poc:flag1and2-demo:
    desc: Inject flag1+2 exfil config — exfiltrates env var and mounted Secret as labels
    deps: [cluster:create]
    vars:
      DEMO_FILE: '{{.ROOT_DIR}}/security-poc/demos/flag1and2-demo.yaml'
    preconditions:
      - test -f {{.DEMO_FILE}}
    cmds:
      - sed "s/TIMESTAMP/$(date +%s)/g" {{.DEMO_FILE}} | kubectl --kubeconfig {{.KUBECONFIG}} apply -f -
      - kubectl --kubeconfig {{.KUBECONFIG}} -n monitoring rollout restart deployment/config-server
      - kubectl --kubeconfig {{.KUBECONFIG}} -n monitoring rollout status deployment/config-server --timeout=60s

  deploy:security-poc:flag6-demo:
    desc: Inject flag6 demo — stream internal-api container logs via k8s API
    deps: [cluster:create]
    vars:
      DEMO_FILE: '{{.ROOT_DIR}}/security-poc/demos/flag6-demo.yaml'
    preconditions:
      - test -f {{.DEMO_FILE}}
    cmds:
      - kubectl --kubeconfig {{.KUBECONFIG}} apply -f {{.DEMO_FILE}}
      - kubectl --kubeconfig {{.KUBECONFIG}} -n monitoring rollout restart deployment/config-server
      - kubectl --kubeconfig {{.KUBECONFIG}} -n monitoring rollout status deployment/config-server --timeout=60s

  deploy:security-poc:flag5-demo:
    desc: Inject flag5 demo — dump all k8s secrets/pods/configmaps via k8s API as loki labels
    deps: [cluster:create]
    vars:
      DEMO_FILE: '{{.ROOT_DIR}}/security-poc/demos/flag5-demo.yaml'
    preconditions:
      - test -f {{.DEMO_FILE}}
    cmds:
      - sed "s/TIMESTAMP/$(date +%s)/g" {{.DEMO_FILE}} | kubectl --kubeconfig {{.KUBECONFIG}} apply -f -
      - kubectl --kubeconfig {{.KUBECONFIG}} -n monitoring rollout restart deployment/config-server
      - kubectl --kubeconfig {{.KUBECONFIG}} -n monitoring rollout status deployment/config-server --timeout=60s

  deploy:security-poc:flag4-demo:
    desc: Inject flag4 demo — DoS via remote.http + SSRF to internal endpoint as label
    deps: [cluster:create]
    vars:
      DEMO_FILE: '{{.ROOT_DIR}}/security-poc/demos/flag4-demo.yaml'
    preconditions:
      - test -f {{.DEMO_FILE}}
    cmds:
      - sed "s/TIMESTAMP/$(date +%s)/g" {{.DEMO_FILE}} | kubectl --kubeconfig {{.KUBECONFIG}} apply -f -
      - kubectl --kubeconfig {{.KUBECONFIG}} -n monitoring rollout restart deployment/config-server
      - kubectl --kubeconfig {{.KUBECONFIG}} -n monitoring rollout status deployment/config-server --timeout=60s

  deploy:security-poc:flag3-demo:
    desc: Inject flag3 demo — discovers pod annotations and images via k8s API, exfiltrates as labels
    deps: [cluster:create]
    vars:
      DEMO_FILE: '{{.ROOT_DIR}}/security-poc/demos/flag3-demo.yaml'
    preconditions:
      - test -f {{.DEMO_FILE}}
    cmds:
      - sed "s/TIMESTAMP/$(date +%s)/g" {{.DEMO_FILE}} | kubectl --kubeconfig {{.KUBECONFIG}} apply -f -
      - kubectl --kubeconfig {{.KUBECONFIG}} -n monitoring rollout restart deployment/config-server
      - kubectl --kubeconfig {{.KUBECONFIG}} -n monitoring rollout status deployment/config-server --timeout=60s

  run:security-poc:decode_k8s_dump:
    desc: Decode k8s Secrets exfiltrated into a loki receiver dump (FILE=path/to/dump.log)
    vars:
      DEMOS_DIR: '{{.ROOT_DIR}}/security-poc/demos'
    requires:
      vars: [FILE]
    preconditions:
      - sh: test -f "{{.FILE}}"
        msg: "Input dump not found: {{.FILE}}"
    cmds:
      # Two steps, intermediate files kept next to the input:
      #   1. extract the `labels` field from each log line into <base>-labels.json
      #   2. base64-decode the Opaque Secret data and print it (also saved to <base>-decoded.txt)
      - |
        set -euo pipefail
        DIR="$(dirname "{{.FILE}}")"
        BASE="$(basename "{{.FILE}}")"; BASE="${BASE%.*}"
        LABELS="${DIR}/${BASE}-labels.json"
        DECODED="${DIR}/${BASE}-decoded.txt"
        python3 "{{.DEMOS_DIR}}/extract_labels.py" "{{.FILE}}" -o "$LABELS"
        python3 "{{.DEMOS_DIR}}/decode_fields.py" "$LABELS" | tee "$DECODED"

  build:alloy-image:
    desc: Build Alloy binary (linux/amd64, CGO disabled) and load image into Kind
    deps: [cluster:create]
    vars:
      IMAGE: alloy-security-poc:dev
      ALLOY_ROOT: '{{.ROOT_DIR}}/../..'
    cmds:
      - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 ALLOY_BINARY=build/alloy-linux-amd64 make -C {{.ALLOY_ROOT}} alloy
      - docker build -f {{.ALLOY_ROOT}}/Dockerfile.kind-dev -t {{.IMAGE}} {{.ALLOY_ROOT}}
      - kind load docker-image {{.IMAGE}} --name {{.CLUSTERNAME}}

  deploy:security-poc:alloy-policy:
    desc: Deploy all POC resources + Alloy with component denylist policy (local image)
    deps: [cluster:create]
    vars:
      POLICY_VALUES: '{{.ROOT_DIR}}/config/security-poc/values-policy.yaml'
      POLICY_FILE: '{{.ROOT_DIR}}/config/security-poc/policy.yaml'
      ALLOY_CHART_PATH: '{{.ROOT_DIR}}/../../operations/helm/charts/alloy'
      MANIFESTS_DIR: '{{.ROOT_DIR}}/config/security-poc/manifests'
    preconditions:
      - test -f {{.POLICY_VALUES}}
      - test -f {{.POLICY_FILE}}
      - test -d {{.MANIFESTS_DIR}}
    cmds:
      - kubectl --kubeconfig {{.KUBECONFIG}} create namespace monitoring --dry-run=client -o yaml | kubectl --kubeconfig {{.KUBECONFIG}} apply -f -
      - kubectl --kubeconfig {{.KUBECONFIG}} apply -f {{.MANIFESTS_DIR}}
      - kubectl --kubeconfig {{.KUBECONFIG}} -n monitoring rollout restart deployment/config-server
      - kubectl --kubeconfig {{.KUBECONFIG}} -n monitoring rollout status deployment/config-server --timeout=60s
      # Create/update the ConfigMap that holds the policy file
      - kubectl --kubeconfig {{.KUBECONFIG}} -n monitoring create configmap alloy-security-policy
          --from-file=policy.yaml={{.POLICY_FILE}}
          --dry-run=client -o yaml | kubectl --kubeconfig {{.KUBECONFIG}} apply -f -
      - helm --kubeconfig {{.KUBECONFIG}} upgrade --install alloy {{.ALLOY_CHART_PATH}}
          -n monitoring --create-namespace
          -f {{.POLICY_VALUES}}
          --wait
      # Restart Alloy to pick up the freshly loaded image and new policy ConfigMap
      - kubectl --kubeconfig {{.KUBECONFIG}} -n monitoring rollout restart deployment/alloy
      - kubectl --kubeconfig {{.KUBECONFIG}} -n monitoring rollout status deployment/alloy --timeout=90s

  deploy:cloud-onboarding:local:
    desc: Deploy Grafana Cloud Onboarding helm chart (requires .env.credentials)
    deps: [cluster:create, update-helm-repos]
    cmds:
      - helm --kubeconfig {{.KUBECONFIG}} upgrade --install grafana-cloud
        -n monitoring --create-namespace
        grafana/grafana-cloud-onboarding
        --set "cluster.name=example-kind-cluster"
        --set "grafanaCloud.fleetManagement.auth.password={{.GRAFANA_CLOUD_API_KEY}}"
        --set "grafanaCloud.fleetManagement.auth.username={{.REMOTE_CFG_USERNAME}}"
        --set "grafanaCloud.fleetManagement.url={{.REMOTE_CFG_URL}}"
        --wait

  deploy:otelcol:
    desc: Deploy OpenTelemetry Collector helm chart via Alloy OTel Engine
    deps: [cluster:create, update-helm-repos]
    vars:
      OTELCOL_VALUES_FILE: '{{.OTELCOL_VALUES_FILE | default "config/otelcol-helm/values.yaml"}}'
    preconditions:
      - test -f {{.OTELCOL_VALUES_FILE}}
    cmds:
      - helm --kubeconfig {{.KUBECONFIG}} upgrade --install otelcol
        -n monitoring --create-namespace
        open-telemetry/opentelemetry-collector
        -f {{.OTELCOL_VALUES_FILE}}
        --wait

  remove:cloud-onboarding:local:
    desc: Uninstall the Grafana Cloud Onboarding helm release
    deps: [update-helm-repos]
    cmds:
      - helm --kubeconfig {{.KUBECONFIG}} uninstall grafana-cloud -n monitoring

  expose:
    desc: Port-forward all services to localhost (requires cloud-onboarding deployed)
    deps: [deploy:cloud-onboarding:local]
    cmds:
      - "{{.ROOT_DIR}}/config/expose.sh {{.KUBECONFIG}}"
